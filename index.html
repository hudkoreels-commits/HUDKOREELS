<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎬 HUDKO REELS STUDIO v1200 - THE ULTIMATE MONSTER + CAMERA</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

<style>
* { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; }
body { background: #000; overflow: hidden; color: white; user-select: none; height: 100dvh; width: 100vw; display: flex; flex-direction: column; }

/* AUTH SCREEN */
#authScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: radial-gradient(circle, #1a1a1a, #000); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
.auth-box { text-align: center; padding: 25px; max-width: 340px; width: 85%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; backdrop-filter: blur(25px); }
.auth-logo { font-size: 30px; font-weight: 900; background: linear-gradient(45deg, #ffaa00, #ff0055, #00fff2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
.auth-input { width: 100%; padding: 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; color: white; margin-bottom: 12px; font-size: 14px; outline: none; }
.action-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; }
.login-btn { background: linear-gradient(45deg, #ffaa00, #ff5500); color: white; width: 100%; }
.signup-btn { background: transparent; color: #ffaa00; border: 1px solid rgba(255,170,0,0.4); margin-top: 10px; width: 100%; }

/* LIVE IN-APP CAMERA OVERLAY */
#cameraRecorderContainer { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: #000; z-index: 450; display: none; flex-direction: column; justify-content: space-between; padding: 20px; padding-bottom: 80px; }
#cameraContainerWrapper { width: 100%; height: 80dvh; position: relative; border-radius: 20px; overflow: hidden; background: #222; }
#cameraPreview { width: 100%; height: 100%; object-fit: cover; display: none; }
#cameraCanvas { width: 100%; height: 100%; object-fit: cover; background: #000; }
.cam-controls { display: flex; justify-content: space-around; align-items: center; width: 100%; height: 10dvh; position: absolute; bottom: 80px; left: 0; z-index: 460; }
.cam-btn { width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; backdrop-filter: blur(10px); }
.record-trigger-btn { width: 75px; height: 75px; border-radius: 50%; background: #ff0055; border: 5px solid white; box-shadow: 0 0 15px rgba(255, 0, 85, 0.5); position: relative; cursor: pointer; }
.record-trigger-btn.recording { background: #fff; border-color: #ff0055; animation: recPulse 1s infinite alternate; }
@keyframes recPulse { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

/* APP LAYOUT */
#appContent { display: none; height: 100dvh; width: 100vw; position: relative; background: #000; }
#top { position: absolute; top: 0; left: 0; right: 0; height: 70px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); display: flex; justify-content: space-between; align-items: center; padding: 25px 15px 0 15px; z-index: 100; }
.brand { font-weight: 900; font-size: 18px; background: linear-gradient(45deg, #ffaa00, #ff0055, #00fff2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.btn-group { display: flex; gap: 8px; }
.upload-btn { background: rgba(255, 255, 255, 0.15); color: white; border: 1px solid rgba(255, 255, 255, 0.2); padding: 8px 14px; border-radius: 20px; font-weight: bold; font-size: 11px; cursor: pointer; backdrop-filter: blur(10px); }
.upload-btn.export-btn { background: linear-gradient(45deg, #00fff2, #0066ff); border: none; color: black; font-weight: 900; }

/* FULL HEIGHT REELS CONTAINER */
#reelsContainer { width: 100%; height: calc(100dvh - 60px); position: absolute; top: 0; left: 0; background: #000; touch-action: none; z-index: 5; }
.reel { width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.video-wrapper { width: 100%; height: 100%; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; box-sizing: border-box; }

video { width: 100%; height: 100%; object-fit: cover; background: #000; transition: filter 0.1s ease; position: relative; z-index: 1; }

.progress-container { position: absolute; bottom: 5px; left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.2); z-index: 50; }
.progress-bar { height: 100%; width: 0%; background: #ffaa00; box-shadow: 0 0 10px #ffaa00; }
.play-indicator { position: absolute; font-size: 50px; color: rgba(255,255,255,0.7); z-index: 30; pointer-events: none; opacity: 0; transition: opacity 0.3s; }

/* FRAME MASTER OVERLAY */
#frameMasterOverlay { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 10; transition: all 0.2s ease; box-sizing: border-box; }

/* OVERLAYS SYSTEM */
.vignette-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.95) 98%); pointer-events: none; z-index: 2; display: none; }
.grain-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); opacity: 0.12; pointer-events: none; z-index: 3; display: none; }
.letterbox-overlay { position: absolute; top:0; left:0; width:100%; height:100%; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; z-index: 4; display: none; }
.letterbox-overlay::before, .letterbox-overlay::after { content: ''; width: 100%; height: 6vh; background: black; }

#neonOverlay { position: absolute; top:0; left:0; width:100%; height:100%; border: 4px solid #00fff2; box-shadow: inset 0 0 20px #00fff2; pointer-events: none; z-index: 5; display: none; box-sizing: border-box; }
#leakOverlay { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(135deg, rgba(255,0,85,0.15), transparent 60%, rgba(255,170,0,0.15)); pointer-events: none; z-index: 6; display: none; }
#gridOverlay { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 20px 20px; pointer-events: none; z-index: 7; display: none; }
#cyberOverlay { position: absolute; top:0; left:0; width:100%; height:100%; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 2px, transparent 2px, transparent 4px); pointer-events: none; z-index: 8; display: none; }

/* OVERLAY TEXT */
.info-overlay-layer { position: absolute; bottom: 25px; left: 15px; right: 75px; pointer-events: none; z-index: 15; display: flex; flex-direction: column; gap: 6px; }
.uploader-profile-name { font-size: 15px; font-weight: 700; color: #00fff2; text-shadow: 1px 1px 4px #000; }
.subtitle-text { color: #fff; font-size: 13px; font-weight: 600; text-shadow: 1px 1px 3px #000; background: rgba(0,0,0,0.4); padding: 6px 12px; border-radius: 8px; display: inline-block; border-left: 3px solid #ffaa00; width: fit-content; }
.audio-name-tag { font-size: 12px; color: #ffaa00; font-weight: bold; text-shadow: 1px 1px 2px #000; display: flex; align-items: center; gap: 4px; }

.social-engagement { position: absolute; right: 12px; bottom: 40px; display: flex; flex-direction: column; gap: 15px; z-index: 20; align-items: center; }
.engage-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
.engage-icon { width: 42px; height: 42px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; backdrop-filter: blur(10px); }
.engage-item span { font-size: 11px; margin-top: 3px; font-weight: 600; text-shadow: 1px 1px 2px #000; }

/* SLIDE UP PANEL SYSTEM */
#panel { position: absolute; bottom: -50dvh; left: 0; right: 0; height: 42dvh; background: rgba(12, 12, 14, 0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); z-index: 550; padding: 15px; display: flex; flex-direction: column; border-radius: 20px 20px 0 0; transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1); }
#panel.open { bottom: 60px; }

.panel-header-title { font-size: 13px; font-weight: bold; color: #ffaa00; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.close-panel-cross { color: #888; cursor: pointer; font-size: 16px; }

.grid-content { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; overflow-y: auto; flex-grow: 1; padding-bottom: 8px; }
.grid-content::-webkit-scrollbar { width: 3px; }
.grid-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

.item-btn { padding: 12px 4px; font-size: 11px; font-weight: 800; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); color: #cfcfcf; border-radius: 8px; cursor: pointer; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-btn.selected { background: linear-gradient(135deg, #ffaa00, #ff5500); color: #000; border: none; box-shadow: 0 0 10px rgba(255,170,0,0.4); }

.slider-container { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex-grow: 1; }
.slider-group { display: flex; flex-direction: column; gap: 4px; background: rgba(255,255,255,0.02); padding: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
.slider-group label { font-size: 11px; color: #aaa; display: flex; justify-content: space-between; font-weight: bold; }
input[type=range] { width: 100%; accent-color: #ffaa00; cursor: pointer; }
.caption-input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; outline: none; }

/* AUDIO LIST STYLES */
.audio-section-wrapper { display: flex; flex-direction: column; height: 100%; overflow-y: auto; }
.audio-search-bar { width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; color: white; font-size: 13px; outline: none; margin-bottom: 10px; }
.playlist-scroll-row { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 10px; flex-shrink: 0; }
.playlist-scroll-row::-webkit-scrollbar { display: none; }
.playlist-card { flex: 0 0 85px; text-align: center; cursor: pointer; }
.playlist-card img { width: 100%; height: 60px; object-fit: cover; border-radius: 8px; }
.playlist-card p { font-size: 10px; font-weight: 700; margin-top: 2px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.songs-vertical-list { display: flex; flex-direction: column; gap: 6px; }
.song-list-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 6px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
.song-list-item.active-song { background: rgba(255, 170, 0, 0.15); border-color: rgba(255, 170, 0, 0.3); }
.song-left-info { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
.song-poster { width: 35px; height: 35px; object-fit: cover; border-radius: 6px; }
.song-meta-text { display: flex; flex-direction: column; min-width: 0; }
.song-display-title { font-size: 11px; font-weight: 700; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.song-artist-sub { font-size: 9px; color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.song-play-btn-circle { width: 26px; height: 26px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; border: none; }

/* BOTTOM STUDIONAV */
#bottomStudioNav { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: #000; border-top: 0.5px solid rgba(255,255,255,0.12); display: flex; justify-content: space-around; align-items: center; z-index: 500; padding-bottom: env(safe-area-inset-bottom); }
.footer-nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; cursor: pointer; font-size: 9px; font-weight: bold; width: 18%; height: 100%; transition: color 0.2s; }
.footer-nav-item.active-trigger { color: #ffaa00; }
.footer-nav-item .material-icons { font-size: 24px; margin-bottom: 2px; }

/* ANIMATION FX PRESETS */
.fx-none { animation: none !important; transform: none !important; }
.fx-zoom-1 { animation: z1 5s infinite alternate ease-in-out; }
.fx-zoom-2 { animation: z2 3s infinite alternate ease-in-out; }
.fx-zoom-3 { animation: z3 1.5s infinite linear; }
.fx-shake-h { animation: sh1 0.07s infinite linear; }
.fx-shake-v { animation: sh2 0.06s infinite linear; }
.fx-bounce { animation: b1 0.4s infinite ease-in-out; }
.fx-glitch { animation: g1 0.25s infinite; }
.fx-pulse { animation: pu1 2s infinite ease-in-out; }
.fx-swing { animation: sw1 2s infinite alternate ease-in-out; }
.fx-wobble { animation: wo1 1s infinite alternate ease-in-out; }
.fx-heartbeat { animation: hb1 0.8s infinite; }
.fx-flip-x { animation: fx1 4s infinite linear; }
.fx-ghost { animation: gh1 0.5s infinite steps(2); }
.fx-jitter { animation: jt1 0.1s infinite alternate; }
.fx-skew { animation: sk1 1.2s infinite alternate ease-in-out; }
.fx-flash { animation: fl1 0.8s infinite; }
.fx-float { animation: flt1 3s infinite alternate ease-in-out; }
.fx-spin-fast { animation: sp2 0.8s infinite linear; }
.fx-vibrate { animation: vb1 0.04s infinite; }
.fx-pop { animation: pp1 0.6s infinite; }
.fx-rubber { animation: rb1 0.9s infinite; }
.fx-blur-pulse { animation: bp1 2.5s infinite ease-in-out; }
.fx-strobe { animation: str1 0.15s infinite; }
.fx-spiral { animation: spi1 6s infinite ease-in-out; }
.fx-dizzy { animation: dz1 1s infinite alternate; }
.fx-mega-bounce { animation: mb1 0.3s infinite alternate ease-in-out; }
.fx-wave { animation: wv1 2s infinite linear; }

@keyframes z1 { 0%{transform:scale(1);} 100%{transform:scale(1.12);} }
@keyframes z2 { 0%{transform:scale(1.05);} 100%{transform:scale(1.22);} }
@keyframes z3 { 0%{transform:scale(1);} 100%{transform:scale(1.5);} }
@keyframes sh1 { 0%,100%{transform:translateX(0);} 50%{transform:translateX(-5px) rotate(0.5deg);} }
@keyframes sh2 { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-5px) rotate(-0.5deg);} }
@keyframes b1 { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
@keyframes g1 { 0%{transform:translate(0);filter:hue-rotate(0deg);} 50%{transform:translate(-3px,3px);filter:hue-rotate(120deg);} 100%{transform:translate(0);} }
@keyframes pu1 { 0%,100%{transform:scale(0.95);opacity:0.9;} 50%{transform:scale(1.05);opacity:1;} }
@keyframes sw1 { 0%{transform:rotate(-5deg);} 100%{transform:rotate(5deg);} }
@keyframes wo1 { 0%{transform:translateX(-6px) rotate(-2deg);} 100%{transform:translateX(6px) rotate(2deg);} }
@keyframes hb1 { 0%,100%,40%,80%{transform:scale(1);} 20%,60%{transform:scale(1.08);} }
@keyframes fx1 { 0%{transform:rotateY(0deg);} 100%{transform:rotateY(360deg);} }
@keyframes gh1 { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.04) translateX(4px); } }
@keyframes jt1 { 0% { transform: translate(1px, 1px) rotate(0deg); } 100% { transform: translate(-1px, -2px) rotate(-1deg); } }
@keyframes sk1 { 0% { transform: skewX(-8deg); } 100% { transform: skewX(8deg); } }
@keyframes fl1 { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.6); } }
@keyframes flt1 { 0% { transform: translateY(0); } 100% { transform: translateY(-15px); } }
@keyframes sp2 { 0% { transform: rotate(0deg); } 100% { rotate(360deg); } }
@keyframes vb1 { 0% { transform: translate(2px, 2px); } 100% { transform: translate(-2px, -2px); } }
@keyframes pp1 { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.9); } }
@keyframes rb1 { 0% { transform: scale3d(1, 1, 1); } 30% { transform: scale3d(1.25, 0.75, 1); } 40% { transform: scale3d(0.75, 1.25, 1); } 50% { transform: scale3d(1.15, 0.85, 1); } 100% { transform: scale3d(1, 1, 1); } }
@keyframes bp1 { 0%, 100% { filter: blur(0px); } 50% { filter: blur(4px); } }
@keyframes str1 { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
@keyframes spi1 { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.2); } 100% { transform: rotate(360deg) scale(1); } }
@keyframes dz1 { 0% { transform: rotate(-3deg) scale(1.02); } 100% { transform: rotate(3deg) scale(1.02); } }
@keyframes mb1 { 0% { transform: translateY(0) scaleQ(1); } 100% { transform: translateY(-30px) scaleQ(1.1); } }
@keyframes wv1 { 0% { transform: rotate(0deg); } 50% { transform: scale(1.1); } 100% { transform: rotate(0deg); } }
</style>
</head>
<body>

<audio id="bgmAudio" loop playsinline crossOrigin="anonymous"></audio>

<div id="cameraRecorderContainer">
    <div id="cameraContainerWrapper">
        <video id="cameraPreview" autoplay playsinline muted></video>
        <canvas id="cameraCanvas"></canvas>
    </div>
    <div class="cam-controls">
        <button class="cam-btn" onclick="closeLiveCamera()">✕</button>
        <button class="record-trigger-btn" id="recBtn" onclick="toggleLiveRecording()"></button>
        <button class="cam-btn" onclick="flipLiveCamera()">🔄</button>
    </div>
</div>

<div id="authScreen">
    <div class="auth-box">
        <div class="auth-logo">HUDKO REELS MAX</div>
        <input type="email" id="emailInput" class="auth-input" placeholder="ಇಮೇಲ್" value="">
        <input type="password" id="passInput" class="auth-input" placeholder="ಪಾಸ್‌ವರ್ಡ್‌" value="">
        <button class="action-btn login-btn" onclick="loginWithEmail()">LOG IN</button>
        <button class="action-btn signup-btn" onclick="signUpWithEmail()">SIGN UP</button>
    </div>
</div>

<div id="appContent">
    <div id="top">
        <h2 class="brand">🎬 HUDKO STUDIO</h2>
        <div class="btn-group">
            <button class="upload-btn" onclick="openLiveCamera()">📸 Live Cam</button>
            <button class="upload-btn" onclick="document.getElementById('fileInput').click()">+ Gallery</button>
            <button class="upload-btn export-btn" onclick="exportCinematicVideo()">⚡ Export</button>
        </div>
    </div>
    <input type="file" id="fileInput" accept="video/*" hidden>

    <div id="reelsContainer">
        <div class="reel">
            <div class="video-wrapper" id="videoWrapperMain">
                <div id="frameMasterOverlay"></div>

                <div class="vignette-overlay" id="vignette"></div>
                <div class="grain-overlay" id="grain"></div>
                <div class="letterbox-overlay" id="letterbox"></div>
                <div id="neonOverlay"></div>
                <div id="leakOverlay"></div>
                <div id="gridOverlay"></div>
                <div id="cyberOverlay"></div>
                
                <div class="play-indicator" id="playIndicator">⏸️</div>
                
                <div class="info-overlay-layer">
                    <span class="uploader-profile-name" id="uploader-tag">@user</span>
                    <span class="subtitle-text" id="caption-box">ಮಾಸ್ಟರ್ ಎಡಿಟ್ ಶುರುಮಾಡಿ... 🎶</span>
                    <span class="audio-name-tag" id="audio-tag"><i class="material-icons" style="font-size:14px">music_note</i> Original Sound</span>
                </div>

                <div class="social-engagement">
                    <div class="engage-item" onclick="triggerLocalGallerySave()"><div class="engage-icon" style="color:#00fff2;">💾</div><span>Save</span></div>
                    <div class="engage-item" onclick="triggerSocialAction('like')"><div class="engage-icon">❤️</div><span id="count-like">0</span></div>
                    <div class="engage-item" onclick="triggerSocialAction('comment')"><div class="engage-icon">💬</div><span id="count-comment">0</span></div>
                    <div class="engage-item" onclick="triggerDirectFileShare()"><div class="engage-icon" style="color:#ffaa00;">✈️</div><span>Share</span></div>
                    <div class="engage-item" style="margin-top: 5px;" onclick="logoutApp()"><div class="engage-icon" style="color:#ff0055;">✕</div><span>Logout</span></div>
                </div>
                <video id="v" loop muted autoplay playsinline crossOrigin="anonymous" src="https://assets.mixkit.co/videos/preview/mixkit-girl-in-neon-light-sign-41846-large.mp4"></video>
            </div>
            <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
        </div>
    </div>

    <div id="panel">
        <div class="panel-header-title">
            <span id="panelTitleDisplay">Filters Panel</span>
            <i class="material-icons close-panel-cross" onclick="closeStudioPanel()">close</i>
        </div>
        <div id="content"></div>
    </div>

    <div id="bottomStudioNav">
        <div class="footer-nav-item" id="btn-nav-lut" onclick="triggerPanelOpen('lut', '📽️ Filters Presets')">
            <i class="material-icons">movie_filter</i><span>Filters</span>
        </div>
        <div class="footer-nav-item" id="btn-nav-motion" onclick="triggerPanelOpen('motion', '🌀 FX Magic Engine')">
            <i class="material-icons">auto_awesome</i><span>FX Magic</span>
        </div>
        <div class="footer-nav-item" id="btn-nav-audio" onclick="triggerPanelOpen('audio', '🎵 Music Selection')">
            <i class="material-icons">library_music</i><span>Music</span>
        </div>
        <div class="footer-nav-item" id="btn-nav-color" onclick="triggerPanelOpen('color', '🎨 Color Correction')">
            <i class="material-icons">tune</i><span>Grading</span>
        </div>
        <div class="footer-nav-item" id="btn-nav-more" onclick="triggerPanelOpen('overlay', '🎭 Overlays & Subtitles')">

          recorder.start();

          // ================= VISUAL EFFECTS RECOVERY FIX =================
          function drawFrame() {
              if (activeVid.paused || activeVid.ended || recorder.state !== "recording") {
                  if(recorder.state === "recording") recorder.stop();
                  return;
              }
              
              // 1. ವಿಡಿಯೋ ಮತ್ತು ಕಲರ್ ಗ್ರೇಡಿಂಗ್

              let gradingString = `brightness(${gradingSettings.brightness}%) contrast(${gradingSettings.contrast}%) saturate(${gradingSettings.saturate}%) hue-rotate(${gradingSettings.hueRotate}deg) sepia(${gradingSettings.sepia}%) blur(${gradingSettings.blur}px) invert(${gradingSettings.invert}%)`;
              exportCtx.filter = `${baseLutString} ${gradingString}`.trim();
              
              exportCtx.drawImage(activeVid, 0, 0, exportCanvas.width, exportCanvas.height);
              
              exportCtx.filter = "none"; // ಓವರ್‌ಲೇಗಳಿಗೆ ಫಿಲ್ಟರ್ ಬೇಡ

              // 2. ಓವರ್‌ಲೇ ಎಫೆಕ್ಟ್ಸ್ (Vignette, Letterbox, Neon)
              if (overlaySettings.vignette) {
                  let grd = exportCtx.createRadialGradient(exportCanvas.width/2, exportCanvas.height/2, exportCanvas.width*0.3, exportCanvas.width/2, exportCanvas.height/2, exportCanvas.width*0.9);

                  exportCtx.fillStyle = grd; exportCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
              }
              if (overlaySettings.letterbox) {
                  exportCtx.fillStyle = "black";
                  exportCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height * 0.08);

              if (overlaySettings.neon) {
                  exportCtx.strokeStyle = "#00fff2"; exportCtx.lineWidth = 14; exportCtx.strokeRect(0, 0, exportCanvas.width, exportCanvas.height);
              }

              // 3. ಫ್ರೇಮ್ ಬಾರ್ಡರ್‌ಗಳು
              if (currentFrame === 'f-cinema-1') {
                  exportCtx.strokeStyle = "black"; exportCtx.lineWidth = 50; exportCtx.strokeRect(0, 0, exportCanvas.width, exportCanvas.height);

                  exportCtx.strokeStyle = "white"; exportCtx.lineWidth = 30; exportCtx.strokeRect(0, 0, exportCanvas.width, exportCanvas.height);

                  exportCtx.font = "bold 24px sans-serif";
                  exportCtx.textAlign = "center";
                  exportCtx.fillText(subtitleText, exportCanvas.width / 2, exportCanvas.height - 80);
              }
              // ===============================================================

              requestAnimationFrame(drawFrame);
          }
          drawFrame();
          
          let vidDuration = activeVid.duration && isFinite(activeVid.duration) && activeVid.duration > 0 ? activeVid.duration : 15;
          setTimeout(() => {
              if(recorder.state === "recording") recorder.stop();

  function renderReelFromFeed(reelData) {

      activeVid.src = reelData.url;

      if(reelData.audioTrackUrl) {

          selectedAudioName = reelData.audioTrackName || "Original Sound";
          bgmAudioPlayer.src = reelData.audioTrackUrl; bgmAudioPlayer.currentTime = 0; bgmAudioPlayer.muted = false;
          bgmAudioPlayer.play().catch(() => { bgmAudioPlayer.muted = true; bgmAudioPlayer.play(); }); activeVid.muted = true; 
      } else { 
          selectedAudioUrl = "";
          bgmAudioPlayer.pause(); activeVid.muted = false; 
      }
      
      activeVid.className = reelData.motionClass || "fx-none";
      activeVid.playbackRate = reelData.speed || 1.0;

      gradingSettings.blur = reelData.blur || 0;
      gradingSettings.sepia = reelData.sepia || 0;
      gradingSettings.invert = reelData.invert || 0;
      overlaySettings = reelData.overlaysMap || { vignette: false, grain: false, letterbox: false, neon: false, leak: false, grid: false, cyber: false };

      applyMasterCinematicEngine();
  }

  let lastTapTime = 0; let touchstartY = 0, touchendY = 0;
  document.getElementById('reelsContainer').addEventListener('touchstart', e => { touchstartY = e.changedTouches[0].screenY; });
  document.getElementById('reelsContainer').addEventListener('touchend', e => {
      touchendY = e.changedTouches[0].screenY; let currentTime = new Date().getTime(); let tapLength = currentTime - lastTapTime;
      if (Math.abs(touchendY - touchstartY) > 40) {
          if (globalReelsFeed.length === 0) return;
          if (touchendY < touchstartY) { currentFeedIndex = (currentFeedIndex + 1) % globalReelsFeed.length; renderReelFromFeed(globalReelsFeed[currentFeedIndex]); }
          else { currentFeedIndex = (currentFeedIndex - 1 + globalReelsFeed.length) % globalReelsFeed.length; renderReelFromFeed(globalReelsFeed[currentFeedIndex]); }
          lastTapTime = 0; return;
      }
      if (tapLength < 300 && tapLength > 0) { triggerSocialAction('like'); e.preventDefault(); } 
      else { setTimeout(() => { if (currentTime - lastTapTime >= 300 && Math.abs(touchendY - touchstartY) < 10) togglePlayPause(); }, 300); }
      lastTapTime = currentTime;
  });

  function togglePlayPause() {
      let indicator = document.getElementById("playIndicator");
      if(activeVid.paused) { activeVid.play(); bgmAudioPlayer.play().catch(()=>{}); indicator.innerText = "▶️"; } 
      else { activeVid.pause(); bgmAudioPlayer.pause(); indicator.innerText = "⏸️"; }
      indicator.style.opacity = "1"; setTimeout(() => { indicator.style.opacity = "0"; }, 600);
  }

  activeVid.addEventListener('timeupdate', () => {
      if(!activeVid.duration) return; progressBar.style.width = ((activeVid.currentTime / activeVid.duration) * 100) + "%";
  });

  window.triggerSocialAction = async (action) => {
      if(globalReelsFeed.length === 0) return;
      let currentReel = globalReelsFeed[currentFeedIndex]; 
      const reelRef = doc(db, "reels", currentReel.id);
      if (action === 'like') {
          await updateDoc(reelRef, { likes: arrayUnion(currentUser ? currentUser.email : "guest") });
          document.getElementById("count-like").innerText = parseInt(document.getElementById("count-like").innerText) + 1;
      } else if (action === 'comment') {
          let commentText = prompt("ನಿಮ್ಮ ಕಾಮೆಂಟ್:"); if(!commentText) return;
          await updateDoc(reelRef, { comments: arrayUnion({ user: currentUser ? currentUser.email : "Guest", text: commentText }) });
          document.getElementById("count-comment").innerText = parseInt(document.getElementById("count-comment").innerText) + 1;
      }
  };

  document.getElementById("fileInput").addEventListener("change", function() {
      let file = this.files[0]; if(!file) return; 
      activeLocalVideoFile = file;
      lastRenderedBlob = null;
      bgmAudioPlayer.pause(); activeVid.src = URL.createObjectURL(file); activeVid.muted = false; activeVid.play();
  });

  window.exportCinematicVideo = async () => {
      let fileToUpload = lastRenderedBlob || activeLocalVideoFile;
      if(!fileToUpload) return alert("ಮೊದಲು ಗ್ಯಾಲರಿಯಿಂದ ವಿಡಿಯೋ ಸೆಲೆಕ್ಟ್ ಮಾಡಿ ಅಥವಾ ಲೈವ್ ಕ್ಯಾಮ್ ಬಳಸಿ ರೆಕಾರ್ಡ್ ಮಾಡಿ!");
      let expBtn = document.querySelector(".export-btn"); 
      let originalText = expBtn.innerText;
      expBtn.innerText = "⏳ Uploading...";
      expBtn.disabled = true;

      try {
          const formData = new FormData();
          formData.append("file", fileToUpload);
          formData.append("upload_preset", "jncyejw0"); 

          let cloudinaryResponse = await fetch("https://api.cloudinary.com/v1_1/dtcrafztp/video/upload", {
              method: "POST",
              body: formData,
              credentials: "omit" 
          });

          let cloudinaryData = await cloudinaryResponse.json();
          
          if (cloudinaryData.error) {
              throw new Error(cloudinaryData.error.message);
          }

          let downloadUrl = cloudinaryData.secure_url; 
          if(!downloadUrl) throw new Error("Cloudinary ಅಪ್ಲೋಡ್ ಲಿಂಕ್ ಸಿಗುತ್ತಿಲ್ಲ!");

          await addDoc(collection(db, "reels"), {
              url: downloadUrl, 
              uploader: currentUser ? currentUser.email.split('@')[0] : "user",
              subtitle: document.getElementById("caption-box").innerText, 
              audioTrackUrl: selectedAudioUrl, 
              audioTrackName: selectedAudioName,
              lutPreset: currentLUT, 
              motionClass: currentMotion, 
              framePresetId: currentFrame, 
              speed: currentSpeed, 
              overlaysMap: overlaySettings,
              bright: gradingSettings.brightness, 
              cont: gradingSettings.contrast, 
              sat: gradingSettings.saturate, 
              hue: gradingSettings.hueRotate, 
              blur: gradingSettings.blur, 
              sepia: gradingSettings.sepia, 
              invert: gradingSettings.invert,
              likes: [], 
              comments: [], 
              timestamp: Date.now()
          });

          alert("💥 ರೀಲ್ ಯಶಸ್ವಿಯಾಗಿ ಅಪ್ಲೋಡ್ ಮತ್ತು ಪಬ್ಲಿಶ್ ಆಗಿದೆ!"); 
          loadGlobalReelsFeed();
      } catch (err) { 
          alert("ಅಪ್ಲೋಡ್ ದೋಷ: " + err.message); 
      } finally { 
          expBtn.innerText = originalText; 
          expBtn.disabled = false;
      }
  };

  window.triggerPanelOpen = (tabType, labelHeader) => {
      document.querySelectorAll(".footer-nav-item").forEach(item => item.classList.remove("active-trigger"));
      const panel = document.getElementById("panel");
      const currentActiveFooterBtn = document.getElementById(`btn-nav-${tabType === 'frame' || tabType === 'overlay' || tabType === 'speed' || tabType === 'subtitle' ? 'more' : tabType}`);
      if(currentActiveFooterBtn) currentActiveFooterBtn.classList.add("active-trigger");

      document.getElementById("panelTitleDisplay").innerText = labelHeader;
      panel.classList.add("open");
      renderTools(tabType);
  };

  window.closeStudioPanel = () => {
      document.getElementById("panel").classList.remove("open");
      document.querySelectorAll(".footer-nav-item").forEach(item => item.classList.remove("active-trigger"));
  };

  async function searchLiveWorldwideTracks(queryText) {
      let listWrapper = document.getElementById("audioListWrapper"); if(!listWrapper) return;
      try {
          let response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(queryText)}&media=music&limit=30`);
          let data = await response.json(); if(!data.results || data.results.length === 0) return;
          listWrapper.innerHTML = "";
          data.results.forEach(track => {
              let isSelected = selectedAudioUrl === track.previewUrl;
              let item = document.createElement("div"); item.className = `song-list-item ${isSelected ? 'active-song' : ''}`;
              item.innerHTML = `
                  <div class="song-left-info"><img class="song-poster" src="${track.artworkUrl60}">
                  <div class="song-meta-text"><span class="song-display-title">${track.trackName}</span>
                  <span class="song-artist-sub">${track.artistName}</span></div></div>
                  <button class="song-play-btn-circle">${isSelected && !bgmAudioPlayer.paused ? '⏸' : '▶'}</button>`;
              item.onclick = function(e) { e.stopPropagation(); playSelectedAudioTrack(track.previewUrl, track.trackName); searchLiveWorldwideTracks(queryText); };
              listWrapper.appendChild(item);
          });
      } catch (err) { console.error(err); }
  }

  function playSelectedAudioTrack(url, name) {
      initGlobalAudioContext();
      if (selectedAudioUrl === url && !bgmAudioPlayer.paused) { bgmAudioPlayer.pause(); } 
      else {
          selectedAudioUrl = url; selectedAudioName = name; bgmAudioPlayer.src = url; bgmAudioPlayer.load();
          bgmAudioPlayer.play().then(() => { if(activeVid) activeVid.muted = true; }).catch(() => { bgmAudioPlayer.muted = true; bgmAudioPlayer.play(); });
          document.getElementById("audio-tag").innerHTML = `<i class="material-icons" style="font-size:14px">music_note</i> ` + name;
      }
  }

  function renderTools(type) {
      let content = document.getElementById("content"); content.innerHTML = ""; content.className = "grid-content";
      
      if (type === "lut") {
          Object.keys(LUT_PRESETS).forEach(key => {
              let b = document.createElement("button"); b.className = `item-btn ${currentLUT === key ? 'selected' : ''}`;
              b.innerText = key.replace('f-', '').toUpperCase();
              b.onclick = () => { currentLUT = key; applyMasterCinematicEngine(); renderTools('lut'); };
              content.appendChild(b);
          });
      } 
      else if (type === "motion") {
          MOTION_PRESETS.forEach(m => {
              let b = document.createElement("button"); b.className = `item-btn ${currentMotion === m.id ? 'selected' : ''}`;
              b.innerText = m.name;
              b.onclick = () => { currentMotion = m.id; applyMasterCinematicEngine(); renderTools('motion'); };
              content.appendChild(b);
          });
      }
      else if (type === "overlay") {
          let divWrap = document.createElement("div"); divWrap.style.gridColumn = "span 3"; divWrap.style.display="flex"; divWrap.style.gap="4px"; divWrap.style.marginBottom="5px";
          divWrap.innerHTML = `
            <button class="item-btn" style="flex:1" onclick="triggerPanelOpen('overlay', '🎭 Overlays Engine')">Overlays</button>
            <button class="item-btn" style="flex:1" onclick="triggerPanelOpen('frame', '🖼️ Borders Frame')">Frames</button>
            <button class="item-btn" style="flex:1" onclick="triggerPanelOpen('speed', '⚡ Speed Logic')">Speed</button>
            <button class="item-btn" style="flex:1" onclick="triggerPanelOpen('subtitle', '✍️ Add Dialogue Subtitle')">Text</button>
          `;
          content.appendChild(divWrap);

          let overlaysList = [
              { id: 'vignette', name: 'VIGNETTE 🌑' }, { id: 'grain', name: 'CINEMA GRAIN 🌫️' }, { id: 'letterbox', name: 'CINEMA BARS 🎞️' },
              { id: 'neon', name: 'NEON BORDER 💎' }, { id: 'leak', name: 'LIGHT LEAK 🌅' }, { id: 'grid', name: 'CAMERA GRID 🌐' }, { id: 'cyber', name: 'CRT LINES 📺' }
          ];
          overlaysList.forEach(o => {
              let b = document.createElement("button"); b.className = `item-btn ${overlaySettings[o.id] ? 'selected' : ''}`;
              b.innerText = o.name;
              b.onclick = () => { overlaySettings[o.id] = !overlaySettings[o.id]; applyMasterCinematicEngine(); renderTools('overlay'); };
              content.appendChild(b);
          });
      }
      else if (type === "frame") {
          let divWrap = document.createElement("div"); divWrap.style.gridColumn = "span 3"; divWrap.style.display="flex"; divWrap.style.gap="4px"; divWrap.style.marginBottom="5px";
          divWrap.innerHTML = `
            <button class="item-btn" style="flex:1" onclick="triggerPanelOpen('overlay', '🎭 Overlays Engine')">Overlays</button>
            <button class="item-btn" style="flex:1" onclick="triggerPanelOpen('frame', '🖼️ Borders Frame')">Frames</button>
            <button class="item-btn" style="flex:1" onclick="triggerPanelOpen('speed', '⚡ Speed Logic')">Speed</button>
            <button class="item-btn" style="flex:1" onclick="triggerPanelOpen('subtitle', '✍️ Add Dialogue Subtitle')">Text</button>
          `;
          content.appendChild(divWrap);

          Object.keys(MASTER_FRAMES_DATABASE).forEach(key => {
              let b = document.createElement("button"); b.className = `item-btn ${currentFrame === key ? 'selected' : ''}`;
              b.innerText = MASTER_FRAMES_DATABASE[key].name;
              b.onclick = () => { currentFrame = key; applyMasterCinematicEngine(); renderTools('frame'); };
              content.appendChild(b);
          });
      }
      else if (type === "speed") {
          let divWrap = document.createElement("div"); divWrap.style.gridColumn = "span 3"; divWrap.style.display="flex"; divWrap.style.gap="4px"; divWrap.style.marginBottom="5px";
          divWrap.innerHTML = `
            <button class="item-btn" style="flex:1" onclick="triggerPanelOpen('overlay', '🎭 Overlays Engine')">Overlays</button>
            <button class="item-btn" style="flex:1" onclick="triggerPanelOpen('frame', '🖼️ Borders Frame')">Frames</button>
            <button class="item-btn" style="flex:1" onclick="triggerPanelOpen('speed', '⚡ Speed Logic')">Speed</button>
            <button class="item-btn" style="flex:1" onclick="triggerPanelOpen('subtitle', '✍️ Add Dialogue Subtitle')">Text</button>
          `;
          content.appendChild(divWrap);

          let speeds = [0.25, 0.5, 1.0, 1.5, 2.0, 3.0];
          speeds.forEach(s => {
              let b = document.createElement("button"); b.className = `item-btn ${currentSpeed === s ? 'selected' : ''}`;
              b.innerText = s === 1.0 ? "NORMAL ⚡" : `${s}x ${s < 1 ? 'SLOW 🐢' : 'FAST 🚀'}`;
              b.onclick = () => { currentSpeed = s; activeVid.playbackRate = s; renderTools('speed'); };
              content.appendChild(b);
          });
      }
      else if (type === "subtitle") {
          content.className = "slider-container";
          let divWrap = document.createElement("div"); divWrap.style.display="flex"; divWrap.style.gap="4px";
          divWrap.innerHTML = `
            <button class="item-btn" style="flex:1" onclick="triggerPanelOpen('overlay', '🎭 Overlays Engine')">Overlays</button>
            <button class="item-btn" style="flex:1" onclick="triggerPanelOpen('frame', '🖼️ Borders Frame')">Frames</button>
            <button class="item-btn" style="flex:1" onclick="triggerPanelOpen('speed', '⚡ Speed Logic')">Speed</button>
            <button class="item-btn" style="flex:1" onclick="triggerPanelOpen('subtitle', '✍️ Add Dialogue Subtitle')">Text</button>
          `;
          content.appendChild(divWrap);

          let input = document.createElement("input"); input.type = "text"; input.className = "caption-input"; input.placeholder = "ಡೈಲಾಗ್ ಸಬ್‌ಟೈಟಲ್ ಇಲ್ಲಿ ಬರೆಯಿರಿ...";
          input.value = document.getElementById("caption-box").innerText === "ಮಾಸ್ಟರ್ ಎಡಿಟ್ ಶುರುಮಾಡಿ... 🎶" ? "" : document.getElementById("caption-box").innerText;
          input.oninput = function() { document.getElementById("caption-box").innerText = this.value || "..."; };
          content.appendChild(input);
      }
      else if (type === "color") {
          content.className = "slider-container";
          let controls = [
              { id: 'brightness', label: 'BRIGHTNESS', min: 30, max: 200, unit: '%' }, { id: 'contrast', label: 'CONTRAST', min: 30, max: 250, unit: '%' },
              { id: 'saturate', label: 'SATURATION', min: 0, max: 300, unit: '%' }, { id: 'hueRotate', label: 'COLOR HUE', min: 0, max: 360, unit: 'deg' },
              { id: 'sepia', label: 'SEPIA', min: 0, max: 100, unit: '%' }, { id: 'blur', label: 'BLUR', min: 0, max: 10, unit: 'px' }, { id: 'invert', label: 'INVERT', min: 0, max: 100, unit: '%' }
          ];
          controls.forEach(c => {
              let div = document.createElement("div"); div.className = "slider-group";
              div.innerHTML = `<label><span>${c.label}</span><span id="v-${c.id}">${gradingSettings[c.id]}${c.unit}</span></label>
                               <input type="range" min="${c.min}" max="${c.max}" value="${gradingSettings[c.id]}">`;
              div.querySelector("input").oninput = function() { gradingSettings[c.id] = this.value; document.getElementById(`v-${c.id}`).innerText = this.value + c.unit; applyMasterCinematicEngine(); };
              content.appendChild(div);
          });
       }
      else if (type === "audio") {
          content.className = "audio-section-wrapper";
          let searchInput = document.createElement("input"); searchInput.type = "text"; searchInput.className = "audio-search-bar";
          searchInput.placeholder = "🔍 ಇಲ್ಲಿ ಟೈಪ್ ಮಾಡಿ (KGF, Kantara...)"; searchInput.value = audioSearchQuery;
          searchInput.oninput = function() {
              audioSearchQuery = this.value.trim(); clearTimeout(searchTimeout);
              if(audioSearchQuery.length > 1) { searchTimeout = setTimeout(() => { searchLiveWorldwideTracks(audioSearchQuery); }, 400); }
          };
          content.appendChild(searchInput);

          let plRow = document.createElement("div"); plRow.className = "playlist-scroll-row";
          KANNADA_PLAYLISTS.forEach(p => {
              let pCard = document.createElement("div"); pCard.className = "playlist-card"; pCard.innerHTML = `<img src="${p.img}"><p>${p.name}</p>`;
              pCard.onclick = () => { searchInput.value = p.name; audioSearchQuery = p.term; searchLiveWorldwideTracks(p.term); };
              plRow.appendChild(pCard);
          });
          content.appendChild(plRow);

          let listWrapper = document.createElement("div"); listWrapper.id = "audioListWrapper"; listWrapper.className = "songs-vertical-list";
          content.appendChild(listWrapper); searchLiveWorldwideTracks("Kannada Hits");
      }
  }

  function applyMasterCinematicEngine() {
      let baseLutString = LUT_PRESETS[currentLUT] || '';
      let gradingString = `brightness(${gradingSettings.brightness}%) contrast(${gradingSettings.contrast}%) saturate(${gradingSettings.saturate}%) hue-rotate(${gradingSettings.hueRotate}deg) sepia(${gradingSettings.sepia}%) blur(${gradingSettings.blur}px) invert(${gradingSettings.invert}%)`.trim();
      
      if(activeVid) { activeVid.className = currentMotion; activeVid.style.filter = `${baseLutString} ${gradingString}`.trim(); }
      
      let frameData = MASTER_FRAMES_DATABASE[currentFrame] || MASTER_FRAMES_DATABASE['none'];
      let frameOverlay = document.getElementById("frameMasterOverlay");
      let wrapperMain = document.getElementById("videoWrapperMain");
      
      if(frameOverlay && wrapperMain) {
          frameOverlay.style.border = frameData.border || 'none';
          frameOverlay.style.boxShadow = frameData.shadow || 'none';
          wrapperMain.style.padding = frameData.padding || '0px';
      }

      document.getElementById("vignette").style.display = overlaySettings.vignette ? "block" : "none";
      document.getElementById("grain").style.display = overlaySettings.grain ? "block" : "none";
      document.getElementById("letterbox").style.display = overlaySettings.letterbox ? "block" : "none";
      document.getElementById("neonOverlay").style.display = overlaySettings.neon ? "block" : "none";
      document.getElementById("leakOverlay").style.display = overlaySettings.leak ? "block" : "none";
      document.getElementById("gridOverlay").style.display = overlaySettings.grid ? "block" : "none";
      document.getElementById("cyberOverlay").style.display = overlaySettings.cyber ? "block" : "none";
  }
  
  window.triggerPanelOpen = triggerPanelOpen; window.closeStudioPanel = closeStudioPanel;
  window.logoutApp = logoutApp; window.loginWithEmail = loginWithEmail; window.signUpWithEmail = signUpWithEmail; 
  window.exportCinematicVideo = exportCinematicVideo; window.openLiveCamera = openLiveCamera; 
  window.closeLiveCamera = closeLiveCamera; window.flipLiveCamera = flipLiveCamera; window.toggleLiveRecording = toggleLiveRecording;
  window.triggerLocalGallerySave = triggerLocalGallerySave; window.triggerDirectFileShare = triggerDirectFileShare;
</script>
</body>
</html>
