  };

  const MOTION_PRESETS = [
      { id: '', name: 'RAW ✖️' }, { id: 'fx-zoom-1', name: 'SLOW ZOOM 🔎' }, { id: 'fx-zoom-3', name: 'MEGA ZOOM 🚀' },
      { id: 'fx-pan-l', name: 'PAN LEFT ➡️' }, { id: 'fx-shake-h', name: 'HARD SHAKE 🌋' }, { id: 'fx-bounce-1', name: 'BASS BOUNCE 🔊' }, 
      { id: 'fx-glitch-1', name: 'GLITCH V1 👾' }, { id: 'fx-whip-h', name: 'WHIP HORIZ 💫' },
      { id: 'fx-pulse', name: 'BEAT PULSE 💓' }, { id: 'fx-flash', name: 'STROBE FLASH ⚡' }
  ];

  const SPEED_PRESETS = [
      { id: 0.25, name: 'EPIC SLO (0.25x)' }, { id: 0.5, name: 'SLO-MO (0.5x)' }, { id: 1.0, name: 'NORMAL (1x)' }, { id: 2.0, name: 'RUSH (2x)' }
  ];

  window.loginWithEmail = async () => {
      let email = document.getElementById("emailInput").value; let pass = document.getElementById("passInput").value;
      try { await signInWithEmailAndPassword(auth, email, pass); } catch (err) { alert(err.message); }
  };
  window.signUpWithEmail = async () => {
      let email = document.getElementById("emailInput").value; let pass = document.getElementById("passInput").value;
      try { await createUserWithEmailAndPassword(auth, email, pass); alert("ಅಕೌಂಟ್ ರೆಡಿಯಾಗಿದೆ!"); } catch (err) { alert(err.message); }
  };
  window.logoutApp = () => signOut(auth);

  onAuthStateChanged(auth, (user) => {
      if (user) { currentUser = user; document.getElementById("authScreen").style.display = "none"; document.getElementById("appContent").style.display = "block"; loadGlobalReelsFeed(); switchTab('lut'); } 
      else { currentUser = null; document.getElementById("authScreen").style.display = "flex"; document.getElementById("appContent").style.display = "none"; }
  });

  async function loadGlobalReelsFeed() {
      try {
          const q = query(collection(db, "reels"), orderBy("timestamp", "desc"));
          const querySnapshot = await getDocs(q);
          globalReelsFeed = []; querySnapshot.forEach((doc) => { let data = doc.data(); data.id = doc.id; globalReelsFeed.push(data); });
          if(globalReelsFeed.length > 0) renderReelFromFeed(globalReelsFeed[currentFeedIndex]);
      } catch (err) { console.error(err); }
  }

  function renderReelFromFeed(reelData) {
      if(!reelData) return;
      activeVid.src = reelData.url;
      
      document.getElementById("uploader-tag").innerText = reelData.uploader ? `@${reelData.uploader}` : "@anonymous";
      document.getElementById("caption-box").innerText = reelData.subtitle || "...";
      document.getElementById("audio-tag").innerText = "🎵 " + (reelData.audioTrackName || "Original Sound");

      if(reelData.audioTrackUrl) { 
          bgmAudioPlayer.src = reelData.audioTrackUrl; 
          bgmAudioPlayer.currentTime = 0; 
          
          // GitHub Pages ಅಟೋಪ್ಲೇ ಬ್ಲಾಕ್ ತಡೆಯಲು ಯೂಸರ್ ಇಂಟರಾಕ್ಷನ್ ಹ್ಯಾಂಡ್ಲರ್ ಬೈಪಾಸ್
          let startPlay = () => {
              bgmAudioPlayer.play().catch(e => console.log("Playback standard block handled"));
              document.removeEventListener('click', startPlay);
              document.removeEventListener('touchstart', startPlay);
          };
          document.addEventListener('click', startPlay);
          document.addEventListener('touchstart', startPlay);
          
          bgmAudioPlayer.play().catch(()=>{}); 
          activeVid.muted = true; 
      } 
      else { 
          bgmAudioPlayer.pause(); 
          activeVid.muted = false; 
      }
      
      activeVid.className = reelData.motionClass || "";
      activeVid.playbackRate = reelData.speed || 1.0;

      let baseLutString = LUT_PRESETS[reelData.lutPreset] || "";
      let sliderString = `brightness(${reelData.bright || 100}%) contrast(${reelData.cont || 100}%) saturate(${reelData.sat || 100}%) hue-rotate(${reelData.hue || 0}deg) blur(${reelData.blur || 0}px) invert(${reelData.invert || 0})`;
      activeVid.style.filter = `${baseLutString} ${sliderString}`.trim();

      document.getElementById("vignette").style.display = reelData.vignetteOn ? "block" : "none";
      document.getElementById("grain").style.display = reelData.grainOn ? "block" : "none";
      document.getElementById("letterbox").style.display = reelData.letterboxOn ? "block" : "none";
      document.getElementById("vhs").style.display = reelData.vhsOn ? "block" : "none";
      document.getElementById("lightleak").style.display = reelData.lightleakOn ? "block" : "none";
      
      document.getElementById("count-like").innerText = reelData.likes ? reelData.likes.length : "0";
      document.getElementById("count-comment").innerText = reelData.comments ? reelData.comments.length : "0";
      activeVid.play().catch(()=>{});
  }

  let lastTapTime = 0; let touchstartY = 0, touchendY = 0;
  const reelsContainer = document.getElementById('reelsContainer');

  reelsContainer.addEventListener('touchstart', e => { touchstartY = e.changedTouches[0].screenY; });
  reelsContainer.addEventListener('touchend', e => {
      touchendY = e.changedTouches[0].screenY;
      let currentTime = new Date().getTime(); let tapLength = currentTime - lastTapTime;

      if (Math.abs(touchendY - touchstartY) > 40) {
          if (globalReelsFeed.length === 0) return;
          if (touchendY < touchstartY) { currentFeedIndex = (currentFeedIndex + 1) % globalReelsFeed.length; renderReelFromFeed(globalReelsFeed[currentFeedIndex]); }
          else { currentFeedIndex = (currentFeedIndex - 1 + globalReelsFeed.length) % globalReelsFeed.length; renderReelFromFeed(globalReelsFeed[currentFeedIndex]); }
          lastTapTime = 0; return;
      }
      if (tapLength < 300 && tapLength > 0) {
          triggerSocialAction('like'); showFloatingHeart(e.changedTouches[0].clientX, e.changedTouches[0].clientY); e.preventDefault();
      } else {
          setTimeout(() => { if (currentTime - lastTapTime >= 300 && Math.abs(touchendY - touchstartY) < 10) togglePlayPause(); }, 300);
      }
      lastTapTime = currentTime;
  });

  function togglePlayPause() {
      let indicator = document.getElementById("playIndicator");
      if(activeVid.paused) { activeVid.play(); bgmAudioPlayer.play().catch(()=>{}); indicator.innerText = "▶️"; } 
      else { activeVid.pause(); bgmAudioPlayer.pause(); indicator.innerText = "⏸️"; }
      indicator.style.opacity = "1"; setTimeout(() => { indicator.style.opacity = "0"; }, 600);
  }

  function showFloatingHeart(x, y) {
      let heart = document.createElement("div"); heart.className = "floating-heart"; heart.innerText = "❤️";
      heart.style.left = (x - 40) + "px"; heart.style.top = (y - 40) + "px";
      document.body.appendChild(heart); setTimeout(() => heart.remove(), 1000);
  }

  activeVid.addEventListener('timeupdate', () => {
      if(!activeVid.duration) return; let progress = (activeVid.currentTime / activeVid.duration) * 100;
      progressBar.style.width = progress + "%";
  });

  window.triggerSocialAction = async (action) => {
      if(globalReelsFeed.length === 0) return;
      let currentReel = globalReelsFeed[currentFeedIndex]; const reelRef = doc(db, "reels", currentReel.id);
      if (action === 'like') {
          await updateDoc(reelRef, { likes: arrayUnion(currentUser ? currentUser.email : "guest") });
          document.getElementById("count-like").innerText = parseInt(document.getElementById("count-like").innerText) + 1;
      } else if (action === 'comment') {
          let commentText = prompt("ನಿಮ್ಮ ಕಾಮೆಂಟ್:"); if(!commentText) return;
          await updateDoc(reelRef, { comments: arrayUnion({ user: currentUser.email, text: commentText }) });
          document.getElementById("count-comment").innerText = parseInt(document.getElementById("count-comment").innerText) + 1;
      } else if (action === 'share') { navigator.clipboard.writeText(currentReel.url); alert("✈️ ಲಿಂಕ್ ಕಾಪಿ ಮಾಡಲಾಗಿದೆ!"); }
  };

  document.getElementById("fileInput").addEventListener("change", function() {
      let file = this.files[0]; if(!file) return; activeLocalVideoFile = file;
      bgmAudioPlayer.pause(); activeVid.src = URL.createObjectURL(file); activeVid.muted = false; activeVid.play();
  });

  window.exportCinematicVideo = async () => {
      if(!activeLocalVideoFile) return alert("ಮೊದಲು ವಿಡಿಯೋ ಸೆಲೆಕ್ಟ್ ಮಾಡಿ!");
      let expBtn = document.querySelector(".export-btn"); expBtn.innerText = "⏳ Uploading...";
      try {
          let storageRef = ref(storage, 'reels/' + Date.now() + '_' + activeLocalVideoFile.name);
          let snap = await uploadBytes(storageRef, activeLocalVideoFile); let downloadUrl = await getDownloadURL(snap.ref);
          
          await addDoc(collection(db, "reels"), {
              url: downloadUrl, uploader: currentUser ? currentUser.email.split('@')[0] : "user",
              subtitle: document.getElementById("caption-box").innerText, audioTrackUrl: selectedAudioUrl, audioTrackName: selectedAudioName,
              lutPreset: currentLUT, motionClass: currentMotion, speed: currentSpeed,
              vignetteOn: overlaySettings.vignette, grainOn: overlaySettings.grain, letterboxOn: overlaySettings.letterbox, 
              vhsOn: overlaySettings.vhs, lightleakOn: overlaySettings.lightleak,
              bright: gradingSettings.brightness, cont: gradingSettings.contrast, sat: gradingSettings.saturate,
              hue: gradingSettings.hueRotate, blur: gradingSettings.blur, invert: gradingSettings.invert,
              likes: [], comments: [], timestamp: Date.now()
          });
          alert("💥 ರೀಲ್ ಯಶಸ್ವಿಯಾಗಿ ಅಪ್ಲೋಡ್ ಆಗಿದೆ!"); loadGlobalReelsFeed();
      } catch (err) { alert(err.message); } finally { expBtn.innerText = "⚡ Export"; }
  };

  window.switchTab = (tab) => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      const targetTab = document.getElementById(`tab-${tab}`);
      if(targetTab) targetTab.classList.add("active"); 
      renderTools(tab);
  };

  function renderTools(type) {
      let content = document.getElementById("content"); content.innerHTML = "";
      
      if (type === "lut") {
          content.className = "grid-content";
          Object.keys(LUT_PRESETS).forEach(key => {
              let b = document.createElement("button"); b.className = `item-btn ${currentLUT === key ? 'selected' : ''}`;
              b.innerText = key.replace('f-', '').toUpperCase();
              b.onclick = () => { currentLUT = key; applyMasterCinematicEngine(); renderTools('lut'); };
              content.appendChild(b);
          });
      } 
      else if (type === "motion") {
          content.className = "grid-content";
          MOTION_PRESETS.forEach(m => {
              let b = document.createElement("button"); b.className = `item-btn ${currentMotion === m.id ? 'selected' : ''}`;
              b.innerText = m.name;
              b.onclick = () => { currentMotion = m.id; applyMasterCinematicEngine(); renderTools('motion'); };
              content.appendChild(b);
          });
      }
      else if (type === "speed") {
          content.className = "grid-content";
          SPEED_PRESETS.forEach(s => {
              let b = document.createElement("button"); b.className = `item-btn ${currentSpeed === s.id ? 'selected' : ''}`;
              b.innerText = s.name;
              b.onclick = () => { currentSpeed = s.id; activeVid.playbackRate = s.id; renderTools('speed'); };
              content.appendChild(b);
          });
      }
      else if (type === "audio") {
          content.className = "audio-section-wrapper"; 
          
          let searchInput = document.createElement("input"); searchInput.type = "text"; searchInput.className = "audio-search-bar";
          searchInput.placeholder = "🔍 Search artists and sounds"; searchInput.value = audioSearchQuery;
          searchInput.oninput = function() {
              audioSearchQuery = this.value.toLowerCase(); clearTimeout(searchTimeout);
              searchTimeout = setTimeout(() => { renderFilteredAudioList(audioSearchQuery); }, 250);
          };
          content.appendChild(searchInput);

          let plTitle = document.createElement("div"); plTitle.className = "music-title-heading"; plTitle.innerText = "Playlists";
          content.appendChild(plTitle);

          let plRow = document.createElement("div"); plRow.className = "playlist-scroll-row";
          KANNADA_PLAYLISTS.forEach(p => {
              let pCard = document.createElement("div"); pCard.className = "playlist-card";
              pCard.innerHTML = `<img src="${p.img}"><p>${p.name}</p>`;
              pCard.onclick = () => { searchInput.value = p.name; audioSearchQuery = p.name.toLowerCase(); renderFilteredAudioList(audioSearchQuery); };
              plRow.appendChild(pCard);
          });
          content.appendChild(plRow);

          let popTitle = document.createElement("div"); popTitle.className = "music-title-heading"; popTitle.innerText = "Popular Hits";
          content.appendChild(popTitle);

          let listWrapper = document.createElement("div"); listWrapper.id = "audioListWrapper"; listWrapper.className = "songs-vertical-list";
          content.appendChild(listWrapper); 
          
          renderFilteredAudioList(audioSearchQuery);
      }
      else if (type === "color") {
          content.className = "slider-container";
          let controls = [
              { id: 'brightness', label: 'BRIGHTNESS', min: 20, max: 200, unit: '%' },
              { id: 'contrast', label: 'CONTRAST', min: 20, max: 250, unit: '%' },
              { id: 'saturate', label: 'SATURATION', min: 0, max: 400, unit: '%' },
              { id: 'hueRotate', label: 'HUE TINT', min: 0, max: 360, unit: 'deg' }
          ];
          controls.forEach(c => {
              let div = document.createElement("div"); div.className = "slider-group";
              div.innerHTML = `<label><span>${c.label}</span><span id="v-${c.id}">${gradingSettings[c.id]}${c.unit}</span></label>
                               <input type="range" min="${c.min}" max="${c.max}" value="${gradingSettings[c.id]}">`;
              div.querySelector("input").oninput = function() { gradingSettings[c.id] = this.value; document.getElementById(`v-${c.id}`).innerText = this.value + c.unit; applyMasterCinematicEngine(); };
              content.appendChild(div);
          });
      }
      else if (type === "subtitle") {
          content.className = "slider-container";
          let input = document.createElement("input"); input.type = "text"; input.className = "caption-input";
          input.placeholder = "ಡೈಲಾಗ್ ಸಬ್‌ಟೈಟಲ್ ಇಲ್ಲಿ ಬರೆಯಿರಿ...";
          input.oninput = function() { document.getElementById("caption-box").innerText = this.value || "..."; };
          content.appendChild(input);
      }
      else if (type === "overlay") {
          content.className = "grid-content";
          let overlays = [
              { id: 'vignette', name: 'VIGNETTE 🌑' }, { id: 'grain', name: 'GRAIN 🌫️' }, { id: 'letterbox', name: 'CINEMA BARS 🎞️' },
              { id: 'vhs', name: '90s VHS 📼' }, { id: 'lightleak', name: 'LIGHT LEAK ✨' }
          ];
          overlays.forEach(o => {
              let b = document.createElement("button"); b.className = `item-btn ${overlaySettings[o.id] ? 'selected' : ''}`;
              b.innerText = o.name;
              b.onclick = () => { overlaySettings[o.id] = !overlaySettings[o.id]; applyMasterCinematicEngine(); renderTools('overlay'); };
              content.appendChild(b);
          });
      }
  }

  function renderFilteredAudioList(queryText) {
      let wrapper = document.getElementById("audioListWrapper"); if(!wrapper) return; wrapper.innerHTML = "";
      let filtered = KANNADA_AUDIO_TRACKS.filter(track => track.name.toLowerCase().includes(queryText) || track.artist.toLowerCase().includes(queryText));
      
      if(filtered.length === 0) { wrapper.innerHTML = "<div style='text-align:center; font-size:12px; color:#666; padding:20px;'>ಯಾವ ಹಾಡು ಸಿಗಲಿಲ್ಲ! ✖️</div>"; return; }
      
      filtered.forEach(track => {
          let isSelected = selectedAudioUrl === track.url;
          let item = document.createElement("div"); 
          item.className = `song-list-item ${isSelected ? 'active-song' : ''}`;
          
          item.innerHTML = `
              <div class="song-left-info">
                  <img class="song-poster" src="${track.img}">
                  <div class="song-meta-text">
                      <span class="song-display-title">${track.name}</span>
                      <span class="song-artist-sub">${track.artist}</span>
                  </div>
              </div>
              <button class="song-play-btn-circle">${isSelected && !bgmAudioPlayer.paused ? '⏸' : '▶'}</button>
          `;
          
          item.onclick = function(e) { 
              e.stopPropagation();
              if (selectedAudioUrl === track.url && !bgmAudioPlayer.paused) {
                  bgmAudioPlayer.pause();
              } else {
                  selectedAudioUrl = track.url; 
                  selectedAudioName = track.name; 
                  
                  // ಕೋರ್ ಫಿಕ್ಸ್: ಆಡಿಯೋ ಟ್ರ್ಯಾಕ್ ಬದಲಾದಾಗ ಎಂಜಿನ್ ರೀ-ಲೋಡ್ ಹಾಗೂ ಬ್ರೌಸರ್ ಕ್ರಾಸ್-ಒರಿಜಿನ್ ಹ್ಯಾಂಡ್ಲಿಂಗ್
                  bgmAudioPlayer.crossOrigin = "anonymous";
                  bgmAudioPlayer.src = track.url; 
                  bgmAudioPlayer.load();
                  
                  let playPromise = bgmAudioPlayer.play();
                  if (playPromise !== undefined) {
                      playPromise.then(() => {
                          if(activeVid) {
                              activeVid.muted = true; 
                              activeVid.currentTime = 0; 
                              activeVid.play().catch(()=>{});
                          }
                      }).catch(error => {
                          console.log("Autoplay context initialization fallback:", error);
                          // ಫೋರ್ಸ್ ಪ್ಲೇ ಮೆಕ್ಯಾನಿಸಂ ಆನ್ ಮುಟೇಡ್ ಸ್ಟೇಟ್
                          bgmAudioPlayer.muted = false;
                          bgmAudioPlayer.play().catch(()=>{});
                      });
                  }
                  document.getElementById("audio-tag").innerText = "🎵 " + track.name;
              }
              renderFilteredAudioList(queryText);
          };
          wrapper.appendChild(item);
      });
  }

  function applyMasterCinematicEngine() {
      let baseLutString = LUT_PRESETS[currentLUT] || '';
      let sliderString = `brightness(${gradingSettings.brightness}%) contrast(${gradingSettings.contrast}%) saturate(${gradingSettings.saturate}%) hue-rotate(${gradingSettings.hueRotate}deg) blur(${gradingSettings.blur}px) invert(${gradingSettings.invert})`;
      if(activeVid) { activeVid.className = currentMotion; activeVid.style.filter = `${baseLutString} ${sliderString}`.trim(); }
      
      document.getElementById("vignette").style.display = overlaySettings.vignette ? "block" : "none";
      document.getElementById("grain").style.display = overlaySettings.grain ? "block" : "none";
      document.getElementById("letterbox").style.display = overlaySettings.letterbox ? "block" : "none";
      document.getElementById("vhs").style.display = overlaySettings.vhs ? "block" : "none";
      document.getElementById("lightleak").style.display = overlaySettings.lightleak ? "block" : "none";
  }
  
  // ಮಾಡ್ಯೂಲ್ ಸ್ಕೋಪ್‌ನಿಂದ ಗ್ಲೋಬಲ್ ವಿಂಡೋಗೆ ಬೈಂಡ್ ಮಾಡಲಾಗಿದೆ
  window.switchTab = switchTab;
  window.logoutApp = logoutApp;
  window.loginWithEmail = loginWithEmail;
  window.signUpWithEmail = signUpWithEmail;
  window.exportCinematicVideo = exportCinematicVideo;
</script>
</body>
</html>
