<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 HUDKO REELS STUDIO v8.0 - GOOGLE AUTH LIVES</title>

<style>
* { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
body {
    margin: 0; background: #020202; overflow: hidden; color: white; user-select: none;
}

/* AUTH LOGIN SCREEN */
#authScreen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
    background: radial-gradient(circle, #1a1a1a, #050505);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 1000; transition: 0.5s ease-out;
}
.auth-box { text-align: center; padding: 30px; max-width: 400px; width: 90%; }
.auth-logo { font-size: 32px; font-weight: 900; letter-spacing: 2px; margin-bottom: 10px; background: linear-gradient(45deg, #ffaa00, #ff0055, #00fff2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.auth-desc { color: #888; font-size: 14px; margin-bottom: 30px; }
.google-btn {
    background: white; color: black; border: none; padding: 14px 24px;
    font-size: 15px; font-weight: bold; border-radius: 30px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(255,255,255,0.1);
    transition: 0.2s;
}
.google-btn:hover { transform: scale(1.03); }

/* MAIN APP (HIDDEN UNTIL LOGIN) */
#appContent { display: none; }

/* TOP NAVIGATION */
#top {
    position: fixed; top: 0; left: 0; right: 0; height: 70px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.95), transparent);
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 20px; z-index: 100;
}
.brand { font-weight: 900; font-size: 20px; background: linear-gradient(45deg, #ffaa00, #ff0055); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.user-profile { display: flex; align-items: center; gap: 10px; }
.profile-pic { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ffaa00; object-fit: cover; }

.btn-group { display: flex; gap: 8px; align-items: center; }
.upload-btn {
    background: linear-gradient(45deg, #ffaa00, #ff5500); color: white; border: none;
    padding: 10px 18px; border-radius: 25px; font-weight: bold; font-size: 12px; cursor: pointer;
    box-shadow: 0 4px 15px rgba(255, 170, 0, 0.4);
}
.logout-btn { background: rgba(255,255,255,0.1); color: white; border: none; padding: 8px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; }

/* REELS CONTAINER */
#reelsContainer { width: 100%; height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
#reelsContainer::-webkit-scrollbar { display: none; }
.reel { width: 100%; height: 100vh; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
.video-wrapper { width: 100%; height: 100vh; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
video { width: 100%; height: 100vh; object-fit: cover; }

/* REELS CREATOR DETAILS (INSTA STYLE) */
.creator-details {
    position: absolute; bottom: 46vh; left: 15px; right: 80px; z-index: 15;
    display: flex; flex-direction: column; gap: 6px; pointer-events: none;
}
.creator-user { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 14px; text-shadow: 1px 1px 3px black; }
.creator-img { width: 28px; height: 28px; border-radius: 50%; border: 1px solid white; }
.subtitle-text { color: #ffffff; font-size: 14px; text-shadow: 1px 1px 3px black; }

/* ENGAGEMENT */
.social-engagement { position: absolute; right: 15px; bottom: 46vh; display: flex; flex-direction: column; align-items: center; gap: 18px; z-index: 20; }
.engage-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
.engage-icon { width: 45px; height: 45px; background: rgba(20, 20, 20, 0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; backdrop-filter: blur(10px); }
.engage-item span { font-size: 11px; margin-top: 4px; font-weight: bold; text-shadow: 1px 1px 3px black; }

/* PANEL */
#panel { position: fixed; bottom: 0; left: 0; right: 0; height: 43vh; background: rgba(6, 6, 6, 0.95); backdrop-filter: blur(40px); border-top: 1px solid rgba(255,255,255,0.08); z-index: 90; padding: 20px; border-radius: 30px 30px 0 0; }
.caption-input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; color: white; margin-top: 10px; }
</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
  import { getFirestore, collection, addDoc, doc, updateDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-storage.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

  // FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyBQ7V6w17s3EUR8n6KR-EZgMmRBQxAFhpM",
    authDomain: "hudkoreels-22c3d.firebaseapp.com",
    projectId: "hudkoreels-22c3d",
    storageBucket: "hudkoreels-22c3d.firebasestorage.app",
    messagingSenderId: "942258546722",
    appId: "1:942258546722:web:c43a44f67164de3be8827b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  let currentUser = null;

  // Global Attachments for HTML Buttons
  window.loginWithGoogle = async () => {
      try {
          await signInWithPopup(auth, provider);
      } catch (err) {
          alert("ಲಾಗಿನ್ ಫೇಲ್ ಆಗಿದೆ: " + err.message);
      }
  };

  window.logoutApp = () => {
      signOut(auth);
  };

  // Auth State Listener
  onAuthStateChanged(auth, (user) => {
      if (user) {
          currentUser = user;
          document.getElementById("authScreen").style.display = "none";
          document.getElementById("appContent").style.display = "block";
          document.getElementById("navUserPic").src = user.photoURL || "https://via.placeholder.com/150";
          document.getElementById("navUserName").innerText = user.displayName;
          loadLiveReels();
      } else {
          currentUser = null;
          document.getElementById("authScreen").style.display = "flex";
          document.getElementById("appContent").style.display = "none";
      }
  });

  // Load Reels Logics
  function loadLiveReels() {
      const q = query(collection(db, "reels"), orderBy("timestamp", "desc"));
      onSnapshot(q, (snapshot) => {
          let container = document.getElementById("reelsContainer");
          container.innerHTML = "";
          
          if(snapshot.empty) {
              container.innerHTML = `<div class="reel"><h3 style='color: #666;'>ಯಾವುದೇ ವಿಡಿಯೋ ಇಲ್ಲ. + Add Footage ಬಳಸಿ ಮೊದಲಿಗರಾಗಿ!</h3></div>`;
              return;
          }

          snapshot.forEach((docSnap) => {
              let data = docSnap.data();
              let id = docSnap.id;
              let reelDiv = document.createElement("div");
              reelDiv.className = "reel";
              reelDiv.innerHTML = `
                  <div class="video-wrapper">
                      <div class="creator-details">
                          <div class="creator-user">
                              <img class="creator-img" src="${data.creatorPic || 'https://via.placeholder.com/150'}">
                              <span>${data.creatorName || 'Anonymous'}</span>
                          </div>
                          <span class="subtitle-text">${data.subtitle || ''}</span>
                      </div>

                      <div class="social-engagement">
                          <div class="engage-item" onclick="window.likeVideo('${id}', ${data.likes || 0})">
                              <div class="engage-icon">❤️</div>
                              <span>${data.likes || 0}</span>
                          </div>
                      </div>
                      <video loop muted autoplay playsinline src="${data.url}" onclick="if(this.paused) this.play(); else this.pause();"></video>
                  </div>
              `;
              container.appendChild(reelDiv);
          });
      });
  }

  // Upload Video Logic
  window.uploadFileToFirebase = async (file) => {
      if(!file || !currentUser) return;
      let btn = document.getElementById("addBtn");
      btn.innerText = "⚡ Uploading...";
      btn.disabled = true;

      try {
          let storageRef = ref(storage, 'reels/' + Date.now() + '_' + file.name);
          let uploadSnap = await uploadBytes(storageRef, file);
          let downloadUrl = await getDownloadURL(uploadSnap.ref);
          
          let subText = document.getElementById("caption-box").value || "Hudko Reels Studio 📲";

          await addDoc(collection(db, "reels"), {
              url: downloadUrl,
              subtitle: subText,
              likes: 0,
              creatorName: currentUser.displayName,
              creatorPic: currentUser.photoURL,
              creatorUid: currentUser.uid,
              timestamp: Date.now()
          });

          alert("🔥 ನಿಮ್ಮ ವಿಡಿಯೋ ಯಶಸ್ವಿಯಾಗಿ ಅಪ್‌ಲೋಡ್ ಆಗಿ ಜಗತ್ತಿಗೆ ಲೈವ್ ಆಗಿದೆ!");
          document.getElementById("caption-box").value = "";
      } catch (err) {
          console.error(err);
          alert("Error: ಅಪ್‌ಲೋಡ್ ಫೇಲ್ ಆಗಿದೆ, ರೂಲ್ಸ್ ಚೆಕ್ ಮಾಡಿ!");
      } finally {
          btn.innerText = "+ Add Footage";
          btn.disabled = false;
      }
  };

  window.likeVideo = async (id, currentLikes) => {
      const docRef = doc(db, "reels", id);
      await updateDoc(docRef, { likes: currentLikes + 1 });
  };
</script>
</head>
<body>

<div id="authScreen">
    <div class="auth-box">
        <div class="auth-logo">HUDKO REELS</div>
        <div class="auth-desc">ಕ್ರಿಯೇಟರ್ಸ್ ಲೋಕಕ್ಕೆ ಸುಸ್ವಾಗತ. ಮುಂದುವರೆಯಲು ಲಾಗಿನ್ ಮಾಡಿ.</div>
        <button class="google-btn" onclick="loginWithGoogle()">
            <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_color_24dp.png" width="18">
            Sign in with Google
        </button>
    </div>
</div>

<div id="appContent">
    <div id="top">
      <h2 class="brand">🎬 HUDKO REELS</h2>
      <div class="btn-group">
          <div class="user-profile">
              <img class="profile-pic" id="navUserPic" src="">
              <span id="navUserName" style="font-size: 12px; font-weight: bold; color: #ccc;"></span>
          </div>
          <button class="logout-btn" onclick="logoutApp()">Logout</button>
      </div>
    </div>

    <input type="file" id="fileInput" accept="video/*" hidden onchange="uploadFileToFirebase(this.files[0])">

    <div id="reelsContainer"></div>

    <div id="panel">
        <h3 style="margin: 0 0 10px 0; font-size: 16px; color: #ffaa00;">🚀 Upload Dashboard</h3>
        <label style="font-size: 12px; color: #aaa;">ವಿಡಿಯೋ ಡೈಲಾಗ್ / ಕ್ಯಾಪ್ಷನ್ ಇಲ್ಲಿ ಬರೆಯಿರಿ:</label>
        <input type="text" id="caption-box" class="caption-input" placeholder="ರೀಲ್ಸ್ ಕ್ಯಾಪ್ಷನ್ ಟೈಪ್ ಮಾಡಿ... ✍️">
        <br><br>
        <button class="upload-btn" id="addBtn" style="width: 100%; padding: 14px;" onclick="document.getElementById('fileInput').click()">+ SELECT VIDEO & UPLOAD</button>
    </div>
</div>

</body>
</html>
