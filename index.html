<!DOCTYPE html>
<html lang="kn">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎬 HUDKO REELS STUDIO v300 - ULTRA MAX</title>

<style>
* { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; }
body { background: #000; overflow: hidden; color: white; user-select: none; height: 100vh; width: 100vw; display: flex; flex-direction: column; }

/* AUTH SCREEN */
#authScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: radial-gradient(circle, #1a1a1a, #000); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
.auth-box { text-align: center; padding: 25px; max-width: 340px; width: 85%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; backdrop-filter: blur(25px); }
.auth-logo { font-size: 30px; font-weight: 900; background: linear-gradient(45deg, #ffaa00, #ff0055, #00fff2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
.auth-input { width: 100%; padding: 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; color: white; margin-bottom: 12px; font-size: 14px; outline: none; }
.action-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; }
.login-btn { background: linear-gradient(45deg, #ffaa00, #ff5500); color: white; width: 100%; }
.signup-btn { background: transparent; color: #ffaa00; border: 1px solid rgba(255,170,0,0.4); margin-top: 10px; width: 100%; }

/* APP LAYOUT */
#appContent { display: none; height: 100vh; width: 100vw; position: relative; }
#top { position: absolute; top: 0; left: 0; right: 0; height: 60px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 100; }
.brand { font-weight: 900; font-size: 18px; background: linear-gradient(45deg, #ffaa00, #ff0055, #00fff2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.btn-group { display: flex; gap: 8px; }
.upload-btn { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.15); padding: 8px 14px; border-radius: 20px; font-weight: bold; font-size: 11px; cursor: pointer; }
.upload-btn.export-btn { background: linear-gradient(45deg, #00fff2, #0066ff); border: none; color: black; font-weight: 900; }

/* REELS CONTAINER */
#reelsContainer { width: 100%; height: 53vh; position: absolute; top: 0; left: 0; background: #000; touch-action: none; }
.reel { width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; }
.video-wrapper { width: 100%; height: 100%; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
video { width: 100%; height: 100%; object-fit: cover; }

.progress-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.2); z-index: 50; }
.progress-bar { height: 100%; width: 0%; background: #ffaa00; box-shadow: 0 0 10px #ffaa00; }
.play-indicator { position: absolute; font-size: 50px; color: rgba(255,255,255,0.7); z-index: 30; pointer-events: none; opacity: 0; transition: opacity 0.3s; }

/* OVERLAYS */
.vignette-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.95) 98%); pointer-events: none; z-index: 2; display: none; }
.grain-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); opacity: 0.08; pointer-events: none; z-index: 3; display: none; }
.letterbox-overlay { position: absolute; top:0; left:0; width:100%; height:100%; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; z-index: 4; display: none; }
.letterbox-overlay::before, .letterbox-overlay::after { content: ''; width: 100%; height: 4vh; background: black; }

.info-overlay-layer { position: absolute; bottom: 15px; left: 15px; right: 75px; pointer-events: none; z-index: 15; display: flex; flex-direction: column; gap: 4px; }
.uploader-profile-name { font-size: 14px; font-weight: 700; color: #00fff2; text-shadow: 1px 1px 3px #000; }
.subtitle-text { color: #fff; font-size: 13px; font-weight: 600; text-shadow: 1px 1px 3px #000; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 6px; display: inline-block; border-left: 3px solid #ffaa00; }
.audio-name-tag { font-size: 11px; color: #ffaa00; font-weight: bold; text-shadow: 1px 1px 2px #000; }

.social-engagement { position: absolute; right: 12px; bottom: 15px; display: flex; flex-direction: column; gap: 12px; z-index: 20; align-items: center; }
.engage-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
.engage-icon { width: 38px; height: 38px; background: rgba(15,15,15,0.7); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; backdrop-filter: blur(10px); }
.engage-item span { font-size: 11px; margin-top: 2px; font-weight: 600; text-shadow: 1px 1px 2px #000; }

/* BOTTOM PANEL */
#panel { position: absolute; bottom: 0; left: 0; right: 0; height: 47vh; background: #0c0c0e; border-top: 1px solid rgba(255,255,255,0.08); z-index: 90; padding: 12px; display: flex; flex-direction: column; border-radius: 16px 16px 0 0; }
.tabs { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid rgba(255,255,255,0.04); padding-bottom: 4px; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 8px 14px; background: rgba(255,255,255,0.03); border-radius: 20px; cursor: pointer; font-size: 11px; font-weight: bold; color: #888; white-space: nowrap; }
.tab.active { background: linear-gradient(45deg, #ffaa00, #ff5500); color: #000; }

.audio-search-bar { width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; color: white; font-size: 13px; outline: none; margin-bottom: 12px; }
.audio-search-bar:focus { border-color: #ffaa00; background: rgba(255,255,255,0.1); }

.grid-content { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; overflow-y: auto; flex-grow: 1; padding-bottom: 8px; }
.item-btn { padding: 12px 4px; font-size: 10px; font-weight: 800; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); color: #cfcfcf; border-radius: 8px; cursor: pointer; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-btn.selected { background: linear-gradient(135deg, #ffaa00, #ff5500); color: white; border: none; }

.slider-container { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex-grow: 1; }
.slider-group { display: flex; flex-direction: column; gap: 3px; }
.slider-group label { font-size: 11px; color: #aaa; display: flex; justify-content: space-between; }
input[type=range] { width: 100%; accent-color: #ffaa00; }
.caption-input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; outline: none; }

/* MUSIC MULTI-PLAYLIST UI */
.audio-section-wrapper { display: flex; flex-direction: column; height: 100%; overflow-y: auto; padding-bottom: 10px; }
.music-title-heading { font-size: 12px; font-weight: bold; color: #ffaa00; margin: 8px 0 6px 0; text-transform: uppercase; letter-spacing: 1px; }
.playlist-scroll-row { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; margin-bottom: 15px; flex-shrink: 0; padding-bottom: 4px; }
.playlist-scroll-row::-webkit-scrollbar { display: none; }
.playlist-card { flex: 0 0 110px; text-align: center; cursor: pointer; transition: transform 0.2s; }
.playlist-card:active { transform: scale(0.95); }
.playlist-card img { width: 100%; height: 75px; object-fit: cover; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12); }
.playlist-card p { font-size: 11px; font-weight: 700; margin-top: 5px; color: #eee; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.songs-vertical-list { display: flex; flex-direction: column; gap: 10px; }
.song-list-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
.song-list-item.active-song { background: rgba(255, 170, 0, 0.15); border-color: rgba(255, 170, 0, 0.4); }
.song-left-info { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; pointer-events: none; }
.song-poster { width: 44px; height: 44px; object-fit: cover; border-radius: 8px; background: #222; border: 1px solid rgba(255,255,255,0.1); }
.song-meta-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.song-display-title { font-size: 13px; font-weight: 700; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.song-artist-sub { font-size: 11px; color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.song-play-btn-circle { width: 34px; height: 34px; background: rgba(255,255,255,0.08); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; color: white; border: none; flex-shrink: 0; }
.song-list-item.active-song .song-play-btn-circle { background: #ffaa00; color: #000; font-weight: bold; box-shadow: 0 0 8px #ffaa00; }

/* FX KEYFRAMES */
.fx-zoom-1 { animation: z1 6s infinite alternate ease-in-out; } .fx-zoom-3 { animation: z3 2s infinite linear; }
.fx-shake-h { animation: sh3 0.08s infinite linear; } .fx-bounce-1 { animation: b1 0.4s infinite ease-in-out; }
@keyframes z1 { 0%{transform:scale(1);} 100%{transform:scale(1.25);} } @keyframes z3 { 0%{transform:scale(1);} 100%{transform:scale(1.8);} }
@keyframes sh3 { 0%,100%{transform:translate(0,0);} 50%{transform:translate(-6px,5px) rotate(1deg);} } @keyframes b1 { 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }
</style>

<body>

<audio id="bgmAudio" loop playsinline></audio>

<div id="authScreen">

</div>

<div id="appContent">

        <div class="btn-group">

    <div id="reelsContainer">
        <div class="reel">
            <div class="video-wrapper">
                <div class="vignette-overlay" id="vignette"></div>
                <div class="grain-overlay" id="grain"></div>
                <div class="letterbox-overlay" id="letterbox"></div>
                
                <div class="play-indicator" id="playIndicator">⏸️</div>
                
                <div class="info-overlay-layer">
                    <span class="uploader-profile-name" id="uploader-tag">@user</span>
                    <span class="subtitle-text" id="caption-box">ಮಾಸ್ಟರ್ ಎಡಿಟ್ ಶುರುಮಾಡಿ... 🎶</span>
                    <span class="audio-name-tag" id="audio-tag">🎵 Original Sound</span>

                <div class="social-engagement">
                    <div class="engage-item" onclick="triggerSocialAction('like')"><div class="engage-icon">❤️</div><span id="count-like">0</span></div>
                    <div class="engage-item" onclick="triggerSocialAction('comment')"><div class="engage-icon">💬</div><span id="count-comment">0</span></div>

    <div id="panel">
        <div class="tabs">
            <div class="tab active" id="tab-lut" onclick="switchTab('lut')">📽️ Filters</div>
            <div class="tab" id="tab-motion" onclick="switchTab('motion')">🌀 FX Magic</div>
            <div class="tab" id="tab-overlay" onclick="switchTab('overlay')">🎭 Overlays</div>
            <div class="tab" id="tab-speed" onclick="switchTab('speed')">⚡ Speed</div>

            <div class="tab" style="color: #ff0055;" onclick="logoutApp()">✕</div>
        </div>
        <div id="content"></div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-storage.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBQ7V6w17s3EUR8n6KR-EZgMmRBQxAFhpM",
    authDomain: "hudkoreels-22c3d.firebaseapp.com",
    projectId: "hudkoreels-22c3d",
    storageBucket: "hudkoreels-22c3d.firebasestorage.app",
    messagingSenderId: "942258546722",
    appId: "1:942258546722:web:c43a44f67164de3be8827b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);
  const auth = getAuth(app);

  let globalReelsFeed = []; 
  let currentFeedIndex = 0;
  let currentUser = null;
  
  let currentLUT = 'f-none';
  let currentMotion = '';
  let currentSpeed = 1.0; 
  let overlaySettings = { vignette: false, grain: false, letterbox: false };
  let gradingSettings = { brightness: 100, contrast: 100 };
  
  let activeLocalVideoFile = null;
  let selectedAudioUrl = "";
  let selectedAudioName = "Original Sound";
  let audioSearchQuery = ""; 
  let searchTimeout = null;

  const bgmAudioPlayer = document.getElementById("bgmAudio");
  const activeVid = document.getElementById("v");
  const progressBar = document.getElementById("progressBar");

  // 500+ ಸಾಂಗ್ಸ್ ಲೋಡ್ ಮಾಡಲು ವೈವಿಧ್ಯಮಯ ಕನ್ನಡ ಕ್ಯಾಟಗರಿಗಳು
  const KANNADA_PLAYLISTS = [
      { name: "KGF 2", term: "KGF Chapter 2", img: "https://api.dicebear.com/7.x/initials/svg?seed=KGF" },
      { name: "Kantara", term: "Kantara", img: "https://api.dicebear.com/7.x/initials/svg?seed=KN" },
      { name: "Pushpa 2 Kannada", term: "Pushpa 2 Kannada", img: "https://api.dicebear.com/7.x/initials/svg?seed=PP" },
      { name: "Dr Rajkumar", term: "Dr. Rajkumar Hits", img: "https://api.dicebear.com/7.x/initials/svg?seed=Annavru" },
      { name: "Ravichandran Romantic", term: "V. Ravichandran Hits", img: "https://api.dicebear.com/7.x/initials/svg?seed=Crazy" },
      { name: "Arjun Janya Hits", term: "Arjun Janya", img: "https://api.dicebear.com/7.x/initials/svg?seed=Janya" },
      { name: "Sadhu Kokila", term: "Sadhu Kokila Comedy", img: "https://api.dicebear.com/7.x/initials/svg?seed=Sadhu" },
      { name: "Sanjith Hegde", term: "Sanjith Hegde", img: "https://api.dicebear.com/7.x/initials/svg?seed=Sanjith" }
  ];

  const LUT_PRESETS = {
      'f-none': '', 'f-oppenheimer': 'contrast(160%) brightness(75%) grayscale(0.2)', 'f-cyberpunk': 'hue-rotate(140deg) saturate(2.5)',
      'f-kgf-gold': 'sepia(0.6) contrast(175%) brightness(75%)', 'f-kantara': 'saturate(1.8) contrast(140%) brightness(75%)'
  };

  const MOTION_PRESETS = [
      { id: '', name: 'RAW ✖️' }, { id: 'fx-zoom-1', name: 'SLOW ZOOM 🔎' }, { id: 'fx-zoom-3', name: 'MEGA ZOOM 🚀' },
      { id: 'fx-shake-h', name: 'HARD SHAKE 🌋' }, { id: 'fx-bounce-1', name: 'BASS BOUNCE 🔊' }
  ];

  window.loginWithEmail = async () => {
      let email = document.getElementById("emailInput").value; let pass = document.getElementById("passInput").value;
      try { await signInWithEmailAndPassword(auth, email, pass); } catch (err) { alert(err.message); }
  };
  window.signUpWithEmail = async () => {
      let email = document.getElementById("emailInput").value; let pass = document.getElementById("passInput").value;
      try { await createUserWithEmailAndPassword(auth, email, pass); alert("ಅಕೌಂಟ್ ರೆಡಿಯಾಗಿದೆ!"); } catch (err) { alert(err.message); }
  };
  window.logoutApp = () => signOut(auth);

  onAuthStateChanged(auth, (user) => {
      if (user) { currentUser = user; document.getElementById("authScreen").style.display = "none"; document.getElementById("appContent").style.display = "block"; loadGlobalReelsFeed(); switchTab('lut'); } 
      else { currentUser = null; document.getElementById("authScreen").style.display = "flex"; document.getElementById("appContent").style.display = "none"; }
  });

  async function loadGlobalReelsFeed() {
      try {
          const q = query(collection(db, "reels"), orderBy("timestamp", "desc"));
          const querySnapshot = await getDocs(q);
          globalReelsFeed = []; querySnapshot.forEach((doc) => { let data = doc.data(); data.id = doc.id; globalReelsFeed.push(data); });
          if(globalReelsFeed.length > 0) renderReelFromFeed(globalReelsFeed[currentFeedIndex]);
      } catch (err) { console.error(err); }
  }

  function renderReelFromFeed(reelData) {
      if(!reelData) return;
      activeVid.src = reelData.url;
      
      document.getElementById("uploader-tag").innerText = reelData.uploader ? `@${reelData.uploader}` : "@anonymous";
      document.getElementById("caption-box").innerText = reelData.subtitle || "...";
      document.getElementById("audio-tag").innerText = "🎵 " + (reelData.audioTrackName || "Original Sound");

      if(reelData.audioTrackUrl) { 
          bgmAudioPlayer.src = reelData.audioTrackUrl; 
          bgmAudioPlayer.currentTime = 0; 
          bgmAudioPlayer.muted = false;
          bgmAudioPlayer.play().catch(() => {
              bgmAudioPlayer.muted = true;
              bgmAudioPlayer.play();
          });
          activeVid.muted = true; 
      } else { 
          bgmAudioPlayer.pause(); 
          activeVid.muted = false; 
      }
      
      activeVid.className = reelData.motionClass || "";
      activeVid.playbackRate = reelData.speed || 1.0;

      let baseLutString = LUT_PRESETS[reelData.lutPreset] || "";
      let sliderString = `brightness(${reelData.bright || 100}%) contrast(${reelData.cont || 100}%)`;
      activeVid.style.filter = `${baseLutString} ${sliderString}`.trim();

      document.getElementById("vignette").style.display = reelData.vignetteOn ? "block" : "none";
      document.getElementById("grain").style.display = reelData.grainOn ? "block" : "none";
      document.getElementById("letterbox").style.display = reelData.letterboxOn ? "block" : "none";
      
      document.getElementById("count-like").innerText = reelData.likes ? reelData.likes.length : "0";
      document.getElementById("count-comment").innerText = reelData.comments ? reelData.comments.length : "0";
      activeVid.play().catch(()=>{});
  }

  let lastTapTime = 0; let touchstartY = 0, touchendY = 0;
  const reelsContainer = document.getElementById('reelsContainer');

  reelsContainer.addEventListener('touchstart', e => { touchstartY = e.changedTouches[0].screenY; });
  reelsContainer.addEventListener('touchend', e => {
      touchendY = e.changedTouches[0].screenY;
      let currentTime = new Date().getTime(); let tapLength = currentTime - lastTapTime;

      if (Math.abs(touchendY - touchstartY) > 40) {
          if (globalReelsFeed.length === 0) return;
          if (touchendY < touchstartY) { currentFeedIndex = (currentFeedIndex + 1) % globalReelsFeed.length; renderReelFromFeed(globalReelsFeed[currentFeedIndex]); }
          else { currentFeedIndex = (currentFeedIndex - 1 + globalReelsFeed.length) % globalReelsFeed.length; renderReelFromFeed(globalReelsFeed[currentFeedIndex]); }
          lastTapTime = 0; return;
      }
      if (tapLength < 300 && tapLength > 0) {
          triggerSocialAction('like'); e.preventDefault();
      } else {
          setTimeout(() => { if (currentTime - lastTapTime >= 300 && Math.abs(touchendY - touchstartY) < 10) togglePlayPause(); }, 300);
      }
      lastTapTime = currentTime;
  });

  function togglePlayPause() {
      let indicator = document.getElementById("playIndicator");
      if(activeVid.paused) { activeVid.play(); bgmAudioPlayer.play().catch(()=>{}); indicator.innerText = "▶️"; } 
      else { activeVid.pause(); bgmAudioPlayer.pause(); indicator.innerText = "⏸️"; }
      indicator.style.opacity = "1"; setTimeout(() => { indicator.style.opacity = "0"; }, 600);
  }

  activeVid.addEventListener('timeupdate', () => {
      if(!activeVid.duration) return; let progress = (activeVid.currentTime / activeVid.duration) * 100;
      progressBar.style.width = progress + "%";
  });

  window.triggerSocialAction = async (action) => {
      if(globalReelsFeed.length === 0) return;
      let currentReel = globalReelsFeed[currentFeedIndex]; const reelRef = doc(db, "reels", currentReel.id);
      if (action === 'like') {
          await updateDoc(reelRef, { likes: arrayUnion(currentUser ? currentUser.email : "guest") });
          document.getElementById("count-like").innerText = parseInt(document.getElementById("count-like").innerText) + 1;
      } else if (action === 'comment') {
          let commentText = prompt("ನಿಮ್ಮ ಕಾಮೆಂಟ್:"); if(!commentText) return;
          await updateDoc(reelRef, { comments: arrayUnion({ user: currentUser.email, text: commentText }) });
          document.getElementById("count-comment").innerText = parseInt(document.getElementById("count-comment").innerText) + 1;
      } else if (action === 'share') { navigator.clipboard.writeText(currentReel.url); alert("✈️ ಲಿಂಕ್ ಕಾಪಿ ಮಾಡಲಾಗಿದೆ!"); }
  };

  document.getElementById("fileInput").addEventListener("change", function() {
      let file = this.files[0]; if(!file) return; activeLocalVideoFile = file;
      bgmAudioPlayer.pause(); activeVid.src = URL.createObjectURL(file); activeVid.muted = false; activeVid.play();
  });

  window.exportCinematicVideo = async () => {
      if(!activeLocalVideoFile) return alert("ಮೊದಲು ವಿಡಿಯೋ ಸೆಲೆಕ್ಟ್ ಮಾಡಿ!");
      let expBtn = document.querySelector(".export-btn"); expBtn.innerText = "⏳ Uploading...";
      try {
          let storageRef = ref(storage, 'reels/' + Date.now() + '_' + activeLocalVideoFile.name);
          let snap = await uploadBytes(storageRef, activeLocalVideoFile); let downloadUrl = await getDownloadURL(snap.ref);
          
          await addDoc(collection(db, "reels"), {
              url: downloadUrl, uploader: currentUser ? currentUser.email.split('@')[0] : "user",
              subtitle: document.getElementById("caption-box").innerText, audioTrackUrl: selectedAudioUrl, audioTrackName: selectedAudioName,
              lutPreset: currentLUT, motionClass: currentMotion, speed: currentSpeed,
              vignetteOn: overlaySettings.vignette, grainOn: overlaySettings.grain, letterboxOn: overlaySettings.letterbox,
              bright: gradingSettings.brightness, cont: gradingSettings.contrast, sat: 100, hue: 0, blur: 0, invert: 0,
              likes: [], comments: [], timestamp: Date.now()
          });
          alert("💥 ರೀಲ್ ಯಶಸ್ವಿಯಾಗಿ ಅಪ್ಲೋಡ್ ಆಗಿದೆ!"); loadGlobalReelsFeed();
      } catch (err) { alert(err.message); } finally { expBtn.innerText = "⚡ Export"; }
  };

  window.switchTab = (tab) => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      const targetTab = document.getElementById(`tab-${tab}`);
      if(targetTab) targetTab.classList.add("active"); 
      renderTools(tab);
  };

  // ಗ್ಲೋಬಲ್ ಲೈವ್ ಇಂಟರ್ನೆಟ್ ಸರ್ಚ್ ಮೆಕ್ಯಾನಿಸಂ (500+ ಸಾಂಗ್ಸ್ ಆಟೋ-ಫೆಚ್ ಎಂಜಿನ್)
  async function searchLiveWorldwideTracks(queryText) {
      let listWrapper = document.getElementById("audioListWrapper");
      if(!listWrapper) return;
      listWrapper.innerHTML = "<div style='text-align:center;font-size:12px;color:#aaa;padding:15px;'>🔍 ಇಂಟರ್ನೆಟ್ ಮ್ಯಾಕ್ಸಿಮಮ್ ಲೋಡಿಂಗ್...</div>";
      
      try {
          // ಲಿಮಿಟ್ ಅನ್ನು 50 ಕ್ಕೆ ಹೆಚ್ಚಿಸಲಾಗಿದೆ ಇದರಿಂದ ಪ್ರತಿಯೊಂದು ಕ್ಲಿಕ್‌ಗೂ ಹೆಚ್ಚಿನ ಹಾಡುಗಳು ಲೋಡ್ ಆಗುತ್ತವೆ
          let response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(queryText)}&media=music&limit=50`);
          let data = await response.json();
          
          if(!data.results || data.results.length === 0) {
              listWrapper.innerHTML = "<div style='text-align:center;font-size:12px;color:#666;padding:15px;'>ಯಾವ ರಿಯಲ್ ಹಾಡು ಸಿಗಲಿಲ್ಲ! ✖️</div>";
              return;
          }
          
          listWrapper.innerHTML = "";
          data.results.forEach(track => {
              let isSelected = selectedAudioUrl === track.previewUrl;
              let item = document.createElement("div");
              item.className = `song-list-item ${isSelected ? 'active-song' : ''}`;
              item.innerHTML = `
                  <div class="song-left-info">
                      <img class="song-poster" src="${track.artworkUrl60 || 'https://api.dicebear.com/7.x/initials/svg?seed=Music'}">
                      <div class="song-meta-text">
                          <span class="song-display-title">${track.trackName}</span>
                          <span class="song-artist-sub">${track.artistName} - ${track.collectionName || 'Movie/Album'}</span>
                      </div>
                  </div>
                  <button class="song-play-btn-circle">${isSelected && !bgmAudioPlayer.paused ? '⏸' : '▶'}</button>
              `;
              
              item.onclick = function(e) {
                  e.stopPropagation();
                  playSelectedAudioTrack(track.previewUrl, track.trackName);
                  searchLiveWorldwideTracks(queryText);
              };
              listWrapper.appendChild(item);
          });
      } catch (err) {
          listWrapper.innerHTML = "<div style='text-align:center;font-size:12px;color:#ff0055;padding:15px;'>ನೆಟ್‌ವರ್ಕ್ ತೊಂದರೆ! ಮತ್ತೆ ಪ್ರಯತ್ನಿಸಿ.</div>";
      }
  }

  function playSelectedAudioTrack(url, name) {
      if (selectedAudioUrl === url && !bgmAudioPlayer.paused) {
          bgmAudioPlayer.pause();
      } else {
          selectedAudioUrl = url;
          selectedAudioName = name;
          bgmAudioPlayer.src = url;
          bgmAudioPlayer.load();
          
          let p = bgmAudioPlayer.play();
          if (p !== undefined) {
              p.then(() => { if(activeVid) activeVid.muted = true; }).catch(() => {
                  bgmAudioPlayer.muted = true;
                  bgmAudioPlayer.play().then(() => { setTimeout(() => { bgmAudioPlayer.muted = false; }, 150); });
              });
          }
          document.getElementById("audio-tag").innerText = "🎵 " + name;
      }
  }

  function renderTools(type) {
      let content = document.getElementById("content"); content.innerHTML = "";
      
      if (type === "lut") {
          content.className = "grid-content";
          Object.keys(LUT_PRESETS).forEach(key => {
              let b = document.createElement("button"); b.className = `item-btn ${currentLUT === key ? 'selected' : ''}`;
              b.innerText = key.replace('f-', '').toUpperCase();
              b.onclick = () => { currentLUT = key; applyMasterCinematicEngine(); renderTools('lut'); };
              content.appendChild(b);
          });
      } 
      else if (type === "motion") {
          content.className = "grid-content";
          MOTION_PRESETS.forEach(m => {
              let b = document.createElement("button"); b.className = `item-btn ${currentMotion === m.id ? 'selected' : ''}`;
              b.innerText = m.name;
              b.onclick = () => { currentMotion = m.id; applyMasterCinematicEngine(); renderTools('motion'); };
              content.appendChild(b);
          });
      }
      else if (type === "audio") {
          content.className = "audio-section-wrapper"; 
          
          let searchInput = document.createElement("input"); searchInput.type = "text"; searchInput.className = "audio-search-bar";
          searchInput.placeholder = "🔎 ಇಲ್ಲಿ ಟೈಪ್ ಮಾಡಿ (ಉದಾ: KGF, Kantara, Puneeth)"; searchInput.value = audioSearchQuery;
          searchInput.oninput = function() {
              audioSearchQuery = this.value.trim();
              clearTimeout(searchTimeout);
              if(audioSearchQuery.length > 2) {
                  searchTimeout = setTimeout(() => { searchLiveWorldwideTracks(audioSearchQuery); }, 500);
              }
          };
          content.appendChild(searchInput);

          let plTitle = document.createElement("div"); plTitle.className = "music-title-heading"; plTitle.innerText = "Kannada Super Playlists (500+)";
          content.appendChild(plTitle);

          let plRow = document.createElement("div"); plRow.className = "playlist-scroll-row";
          KANNADA_PLAYLISTS.forEach(p => {
              let pCard = document.createElement("div"); pCard.className = "playlist-card";
              pCard.innerHTML = `<img src="${p.img}"><p>${p.name}</p>`;
              pCard.onclick = () => { searchInput.value = p.name; audioSearchQuery = p.term; searchLiveWorldwideTracks(p.term); };
              plRow.appendChild(pCard);
          });
          content.appendChild(plRow);

          let popTitle = document.createElement("div"); popTitle.className = "music-title-heading"; popTitle.innerText = "Loaded Songs";
          content.appendChild(popTitle);

          let listWrapper = document.createElement("div"); listWrapper.id = "audioListWrapper"; listWrapper.className = "songs-vertical-list";
          content.appendChild(listWrapper); 
          
          // ಸ್ಟಾರ್ಟಿಂಗ್‌ನಲ್ಲಿ ಟ್ರೆಂಡಿಂಗ್ ಹಾಡುಗಳನ್ನು ರೆಡಿ ಇಡುವುದು
          searchLiveWorldwideTracks("Kannada Hits");
      }
      else if (type === "color") {
          content.className = "slider-container";
          let controls = [
              { id: 'brightness', label: 'BRIGHTNESS', min: 20, max: 200, unit: '%' },
              { id: 'contrast', label: 'CONTRAST', min: 20, max: 250, unit: '%' }
          ];
          controls.forEach(c => {
              let div = document.createElement("div"); div.className = "slider-group";
              div.innerHTML = `<label><span>${c.label}</span><span id="v-${c.id}">${gradingSettings[c.id]}${c.unit}</span></label>
                               <input type="range" min="${c.min}" max="${c.max}" value="${gradingSettings[c.id]}">`;
              div.querySelector("input").oninput = function() { gradingSettings[c.id] = this.value; document.getElementById(`v-${c.id}`).innerText = this.value + c.unit; applyMasterCinematicEngine(); };
              content.appendChild(div);
          });
      }
      else if (type === "subtitle") {
          content.className = "slider-container";
          let input = document.createElement("input"); input.type = "text"; input.className = "caption-input";
          input.placeholder = "ಡೈಲಾಗ್ ಸಬ್‌ಟೈಟಲ್ ಇಲ್ಲಿ ಬರೆಯಿರಿ...";
          input.oninput = function() { document.getElementById("caption-box").innerText = this.value || "..."; };
          content.appendChild(input);
      }
      else if (type === "overlay") {
          content.className = "grid-content";
          let overlays = [
              { id: 'vignette', name: 'VIGNETTE 🌑' }, { id: 'grain', name: 'GRAIN 🌫️' }, { id: 'letterbox', name: 'CINEMA BARS 🎞️' }
          ];
          overlays.forEach(o => {
              let b = document.createElement("button"); b.className = `item-btn ${overlaySettings[o.id] ? 'selected' : ''}`;
              b.innerText = o.name;
              b.onclick = () => { overlaySettings[o.id] = !overlaySettings[o.id]; applyMasterCinematicEngine(); renderTools('overlay'); };
              content.appendChild(b);
          });
      }
  }

  function applyMasterCinematicEngine() {
      let baseLutString = LUT_PRESETS[currentLUT] || '';
      let sliderString = `brightness(${gradingSettings.brightness}%) contrast(${gradingSettings.contrast}%)`;
      if(activeVid) { activeVid.className = currentMotion; activeVid.style.filter = `${baseLutString} ${sliderString}`.trim(); }
      
      document.getElementById("vignette").style.display = overlaySettings.vignette ? "block" : "none";
      document.getElementById("grain").style.display = overlaySettings.grain ? "block" : "none";
      document.getElementById("letterbox").style.display = overlaySettings.letterbox ? "block" : "none";
  }
  
  window.switchTab = switchTab;
  window.logoutApp = logoutApp;
  window.loginWithEmail = loginWithEmail;
  window.signUpWithEmail = signUpWithEmail;
  window.exportCinematicVideo = exportCinematicVideo;
</script>
</body>
</html>
