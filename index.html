.fx-skew { animation: sk1 1.2s infinite alternate ease-in-out; }
.fx-flash { animation: fl1 0.8s infinite; }
.fx-float { animation: flt1 3s infinite alternate ease-in-out; }
.fx-spin-fast { animation: sp2 0.8s infinite linear; }
.fx-vibrate { animation: vb1 0.04s infinite; }
.fx-pop { animation: pp1 0.6s infinite; }
.fx-rubber { animation: rb1 0.9s infinite; }
.fx-blur-pulse { animation: bp1 2.5s infinite ease-in-out; }
.fx-strobe { animation: str1 0.15s infinite; }
.fx-spiral { animation: spi1 6s infinite ease-in-out; }
.fx-dizzy { animation: dz1 1s infinite alternate; }
.fx-mega-bounce { animation: mb1 0.3s infinite alternate ease-in-out; }
.fx-wave { animation: wv1 2s infinite linear; }

@keyframes z1 { 0%{transform:scale(1);} 100%{transform:scale(1.12);} }
@keyframes z2 { 0%{transform:scale(1.05);} 100%{transform:scale(1.22);} }
@keyframes z3 { 0%{transform:scale(1);} 100%{transform:scale(1.5);} }

@keyframes sh2 { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-5px) rotate(-0.5deg);} }

@keyframes sw1 { 0%{transform:rotate(-5deg);} 100%{transform:rotate(5deg);} }
@keyframes wo1 { 0%{transform:translateX(-6px) rotate(-2deg);} 100%{transform:translateX(6px) rotate(2deg);} }
@keyframes hb1 { 0%,100%,40%,80%{transform:scale(1);} 20%,60%{transform:scale(1.08);} }
@keyframes fx1 { 0%{transform:rotateY(0deg);} 100%{transform:rotateY(360deg);} }
@keyframes gh1 { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.04) translateX(4px); } }
@keyframes jt1 { 0% { transform: translate(1px, 1px) rotate(0deg); } 100% { transform: translate(-1px, -2px) rotate(-1deg); } }
@keyframes sk1 { 0% { transform: skewX(-8deg); } 100% { transform: skewX(8deg); } }
@keyframes fl1 { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.6); } }
@keyframes flt1 { 0% { transform: translateY(0); } 100% { transform: translateY(-15px); } }

@keyframes vb1 { 0% { transform: translate(2px, 2px); } 100% { transform: translate(-2px, -2px); } }
@keyframes pp1 { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.9); } }
@keyframes rb1 { 0% { transform: scale3d(1, 1, 1); } 30% { transform: scale3d(1.25, 0.75, 1); } 40% { transform: scale3d(0.75, 1.25, 1); } 50% { transform: scale3d(1.15, 0.85, 1); } 100% { transform: scale3d(1, 1, 1); } }

@keyframes dz1 { 0% { transform: rotate(-3deg) scale(1.02); } 100% { transform: rotate(3deg) scale(1.02); } }
@keyframes mb1 { 0% { transform: translateY(0) scaleQ(1); } 100% { transform: translateY(-30px) scaleQ(1.1); } }
@keyframes wv1 { 0% { transform: rotate(0deg); } 50% { transform: scale(1.1); } 100% { transform: rotate(0deg); } }

  window.toggleLiveRecording = () => {
      const recBtn = document.getElementById("recBtn");
      
      if (mediaRecorder && mediaRecorder.state === "recording") {
          mediaRecorder.stop();
          recBtn.classList.remove("recording");
          bgmAudioPlayer.pause();
      } else {
          recordedChunks = [];
          let mixedStream = new MediaStream();

          cameraStream.getVideoTracks().forEach(track => mixedStream.addTrack(track));

          // 🎵 Real-time Instagram Style Background Music Mixing & Sync Logic 
          if (selectedAudioUrl) {
              const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
              
              // Direct Stream Processing without breaking cross-origin blockades
              const sourceNode = audioCtx.createMediaElementSource(bgmAudioPlayer);
              const destNode = audioCtx.createMediaStreamDestination();
              
              if (cameraStream.getAudioTracks().length > 0) {
                  const micNode = audioCtx.createMediaStreamSource(cameraStream);
                  micNode.connect(destNode); // Mix microphone input
              }
              
              sourceNode.connect(destNode); // Mix background music track
              sourceNode.connect(audioCtx.destination); // Play locally so user can hear while recording
              
              destNode.stream.getAudioTracks().forEach(track => mixedStream.addTrack(track));
          } else {
              cameraStream.getAudioTracks().forEach(track => mixedStream.addTrack(track));
          }

          // Full Standard Multi-Codec fallbacks for Maximum compatibility on Production launch
          let options = { mimeType: 'video/webm;codecs=vp9,opus' };
          if (!MediaRecorder.isTypeSupported(options.mimeType)) {
              options = { mimeType: 'video/webm;codecs=vp8,opus' };
          }
          if (!MediaRecorder.isTypeSupported(options.mimeType)) {
              options = { mimeType: 'video/mp4' };
          }

          mediaRecorder = new MediaRecorder(mixedStream, options);
          mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
          
          mediaRecorder.onstop = () => {
              let blob = new Blob(recordedChunks, { type: 'video/mp4' });

          };

  document.getElementById('reelsContainer').addEventListener('touchend', e => {
      touchendY = e.changedTouches[0].screenY; let currentTime = new Date().getTime(); let tapLength = currentTime - lastTapTime;
      if (Math.abs(touchendY - touchstartY) > 40) {
          if (globalReelsFeed.length === 0) return;
          if (touchendY < touchstartY) { currentFeedIndex = (currentFeedIndex + 1) % globalReelsFeed.length; renderReelFromFeed(globalReelsFeed[currentFeedIndex]); }
          else { currentFeedIndex = (currentFeedIndex - 1 + globalReelsFeed.length) % globalReelsFeed.length; renderReelFromFeed(globalReelsFeed[currentFeedIndex]); }
          lastTapTime = 0; return;
      }
      if (tapLength < 300 && tapLength > 0) { triggerSocialAction('like'); e.preventDefault(); } 
      else { setTimeout(() => { if (currentTime - lastTapTime >= 300 && Math.abs(touchendY - touchstartY) < 10) togglePlayPause(); }, 300); }

              div.innerHTML = `<label><span>${c.label}</span><span id="v-${c.id}">${gradingSettings[c.id]}${c.unit}</span></label>
                               <input type="range" min="${c.min}" max="${c.max}" value="${gradingSettings[c.id]}">`;
              div.querySelector("input").oninput = function() { gradingSettings[c.id] = this.value; document.getElementById(`v-${c.id}`).innerText = this.value + c.unit; applyMasterCinematicEngine(); };
              content.appendChild(div);
          });
       }
      else if (type === "speed") {
          let speeds = [0.25, 0.5, 1.0, 1.5, 2.0, 3.0];
          speeds.forEach(s => {
              let b = document.createElement("button"); b.className = `item-btn ${currentSpeed === s ? 'selected' : ''}`;
              b.innerText = s === 1.0 ? "NORMAL ⚡" : `${s}x ${s < 1 ? 'SLOW 🐢' : 'FAST 🚀'}`;
              b.onclick = () => { currentSpeed = s; activeVid.playbackRate = s; renderTools('speed'); };
              content.appendChild(b);
          });
       }
      else if (type === "audio") {
          content.className = "audio-section-wrapper";
          let searchInput = document.createElement("input"); searchInput.type = "text"; searchInput.className = "audio-search-bar";
          searchInput.placeholder = "🔍 ಇಲ್ಲಿ ಟೈಪ್ ಮಾಡಿ (KGF, Kantara...)"; searchInput.value = audioSearchQuery;
          searchInput.oninput = function() {
              audioSearchQuery = this.value.trim(); clearTimeout(searchTimeout);
              if(audioSearchQuery.length > 1) { searchTimeout = setTimeout(() => { searchLiveWorldwideTracks(audioSearchQuery); }, 400); }
          };
          content.appendChild(searchInput);

          let plRow = document.createElement("div"); plRow.className = "playlist-scroll-row";
          KANNADA_PLAYLISTS.forEach(p => {
              let pCard = document.createElement("div"); pCard.className = "playlist-card"; pCard.innerHTML = `<img src="${p.img}"><p>${p.name}</p>`;
              pCard.onclick = () => { searchInput.value = p.name; audioSearchQuery = p.term; searchLiveWorldwideTracks(p.term); };
              plRow.appendChild(pCard);
          });
          content.appendChild(plRow);

          let listWrapper = document.createElement("div"); listWrapper.id = "audioListWrapper"; listWrapper.className = "songs-vertical-list";
          content.appendChild(listWrapper); searchLiveWorldwideTracks("Kannada Hits");
      }
      else if (type === "subtitle") {
          content.className = "slider-container";
          let input = document.createElement("input"); input.type = "text"; input.className = "caption-input"; input.placeholder = "ಡೈಲಾಗ್ ಸಬ್‌ಟೈಟಲ್ ಇಲ್ಲಿ ಬರೆಯಿರಿ...";
          input.oninput = function() { document.getElementById("caption-box").innerText = this.value || "..."; };
          content.appendChild(input);
      }
  }

  function applyMasterCinematicEngine() {
      let baseLutString = LUT_PRESETS[currentLUT] || '';
      let gradingString = `brightness(${gradingSettings.brightness}%) contrast(${gradingSettings.contrast}%) saturate(${gradingSettings.saturate}%) hue-rotate(${gradingSettings.hueRotate}deg) sepia(${gradingSettings.sepia}%) blur(${gradingSettings.blur}px) invert(${gradingSettings.invert}%)`.trim();
      
      if(activeVid) { activeVid.className = currentMotion; activeVid.style.filter = `${baseLutString} ${gradingString}`.trim(); }
      
      let frameData = MASTER_FRAMES_DATABASE[currentFrame] || MASTER_FRAMES_DATABASE['none'];
      let frameOverlay = document.getElementById("frameMasterOverlay");
      let wrapperMain = document.getElementById("videoWrapperMain");
      
      if(frameOverlay && wrapperMain) {
          frameOverlay.style.border = frameData.border || 'none';
          frameOverlay.style.boxShadow = frameData.shadow || 'none';
          wrapperMain.style.padding = frameData.padding || '0px';
      }

      document.getElementById("vignette").style.display = overlaySettings.vignette ? "block" : "none";
      document.getElementById("grain").style.display = overlaySettings.grain ? "block" : "none";
      document.getElementById("letterbox").style.display = overlaySettings.letterbox ? "block" : "none";
      document.getElementById("neonOverlay").style.display = overlaySettings.neon ? "block" : "none";
      document.getElementById("leakOverlay").style.display = overlaySettings.leak ? "block" : "none";
      document.getElementById("gridOverlay").style.display = overlaySettings.grid ? "block" : "none";
      document.getElementById("cyberOverlay").style.display = overlaySettings.cyber ? "block" : "none";
  }
  
  window.switchTab = switchTab; window.logoutApp = logoutApp; window.loginWithEmail = loginWithEmail;
  window.signUpWithEmail = signUpWithEmail; window.exportCinematicVideo = exportCinematicVideo;
  window.openLiveCamera = openLiveCamera; window.closeLiveCamera = closeLiveCamera;
  window.flipLiveCamera = flipLiveCamera; window.toggleLiveRecording = toggleLiveRecording;
</script>
</body>
</html>
