<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 HUDKO REELS STUDIO v10.0 - PERFECT PRODUCTION</title>

<style>
* { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
body { margin: 0; background: #020202; overflow: hidden; color: white; user-select: none; }

/* LOGIN SCREEN */
#authScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: radial-gradient(circle, #1a1a1a, #050505); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
.auth-box { text-align: center; padding: 30px; max-width: 400px; width: 90%; }
.auth-logo { font-size: 36px; font-weight: 900; letter-spacing: 2px; margin-bottom: 10px; background: linear-gradient(45deg, #ffaa00, #ff0055, #00fff2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.auth-desc { color: #888; font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
.google-btn { background: white; color: black; border: none; padding: 14px 28px; font-size: 15px; font-weight: bold; border-radius: 30px; cursor: pointer; display: inline-flex; align-items: center; gap: 12px; box-shadow: 0 4px 20px rgba(255,255,255,0.15); }

/* MAIN APP */
#appContent { display: none; }
#top { position: fixed; top: 0; left: 0; right: 0; height: 70px; background: linear-gradient(to bottom, rgba(0,0,0,0.95), transparent); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 100; }
.brand { font-weight: 900; font-size: 22px; background: linear-gradient(45deg, #ffaa00, #ff5500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.user-profile { display: flex; align-items: center; gap: 10px; }
.profile-pic { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ffaa00; object-fit: cover; }
.btn-group { display: flex; gap: 12px; align-items: center; }
.logout-btn { background: rgba(255,255,255,0.12); color: white; border: none; padding: 8px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; font-weight: bold; }

/* REELS PLAYER */
#reelsContainer { width: 100%; height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
#reelsContainer::-webkit-scrollbar { display: none; }
.reel { width: 100%; height: 100vh; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
.video-wrapper { width: 100%; height: 100vh; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
video { width: 100%; height: 100vh; object-fit: cover; }

/* OVERLAYS */
.creator-details { position: absolute; bottom: 46vh; left: 15px; right: 80px; z-index: 15; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.creator-user { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 15px; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); }
.creator-img { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid white; object-fit: cover; }
.subtitle-text { color: #f0f0f0; font-size: 14px; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); line-height: 1.4; }

.social-engagement { position: absolute; right: 15px; bottom: 46vh; display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 20; }
.engage-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
.engage-icon { width: 48px; height: 48px; background: rgba(25, 25, 25, 0.65); border: 1px solid rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; backdrop-filter: blur(15px); }
.engage-item span { font-size: 12px; margin-top: 5px; font-weight: bold; text-shadow: 1px 1px 3px black; }

/* BOTTOM PANEL */
#panel { position: fixed; bottom: 0; left: 0; right: 0; height: 43vh; background: rgba(10, 10, 10, 0.96); backdrop-filter: blur(50px); border-top: 1px solid rgba(255,255,255,0.1); z-index: 90; padding: 22px; border-radius: 30px 30px 0 0; }
.caption-input { width: 100%; padding: 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; color: white; margin-top: 10px; font-size: 14px; }
.caption-input:focus { outline: none; border-color: #ffaa00; }
.upload-btn { background: linear-gradient(45deg, #ffaa00, #ff5500); color: white; border: none; padding: 15px; border-radius: 25px; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 4px 20px rgba(255, 170, 0, 0.4); width: 100%; margin-top: 20px; }
.upload-btn:disabled { background: #444; box-shadow: none; cursor: not-allowed; }
</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
  import { getFirestore, collection, addDoc, doc, updateDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-storage.js";
  import { getAuth, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

  // ನಿಮ್ಮ ಸ್ಕ್ರೀನ್‌ಶಾಟ್‌ನಿಂದ ಅಪ್‌ಡೇಟ್ ಮಾಡಲಾದ ಅಸಲಿ ಕಾನ್ಫಿಗರೇಶನ್ ಕೋಡ್
  const firebaseConfig = {
    apiKey: "AIzaSyBQ7V6w17s3EUR8n6KR-EZgMmRBQxAFhpM",
    authDomain: "hudkoreels-22c3d.firebaseapp.com",
    databaseURL: "https://hudkoreels-22c3d-default-rtdb.firebaseio.com",
    projectId: "hudkoreels-22c3d",
    storageBucket: "hudkoreels-22c3d.firebasestorage.app",
    messagingSenderId: "942258546722",
    appId: "1:942258546722:web:c43a44f67164de3be8827b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  let currentUser = null;

  // Google Login Trigger
  window.loginWithGoogle = async () => {
      try {
          await signInWithRedirect(auth, provider);
      } catch (err) {
          alert("ಲಾಗಿನ್ ಮಾಡಲು ಸಾಧ್ಯವಾಗುತ್ತಿಲ್ಲ: " + err.message);
      }
  };

  // Logout Trigger
  window.logoutApp = () => {
      if(confirm("ಖಂಡಿತ ಲಾಗ್ ಔಟ್ ಮಾಡಬೇಕೇ?")) {
          signOut(auth);
      }
  };

  // Handle Redirect Result
  getRedirectResult(auth).catch((err) => {
      console.error("Redirect Auth Error:", err);
  });

  // Auth State Listener
  onAuthStateChanged(auth, (user) => {
      if (user) {
          currentUser = user;
          document.getElementById("authScreen").style.display = "none";
          document.getElementById("appContent").style.display = "block";
          document.getElementById("navUserPic").src = user.photoURL || "https://via.placeholder.com/150";
          document.getElementById("navUserName").innerText = user.displayName.split(" ")[0];
          loadLiveReels();
      } else {
          currentUser = null;
          document.getElementById("authScreen").style.display = "flex";
          document.getElementById("appContent").style.display = "none";
      }
  });

  // Load Reels Live
  function loadLiveReels() {
      const q = query(collection(db, "reels"), orderBy("timestamp", "desc"));
      onSnapshot(q, (snapshot) => {
          let container = document.getElementById("reelsContainer");
          container.innerHTML = "";
          
          if(snapshot.empty) {
              container.innerHTML = `<div class="reel"><h3 style='color: #666; text-align:center; padding:20px;'>ಯಾವುದೇ ವಿಡಿಯೋ ಲೈವ್ ಇಲ್ಲ.<br>ಮೊದಲ ವಿಡಿಯೋ ಅಪ್‌ಲೋಡ್ ಮಾಡಿ! ✨</h3></div>`;
              return;
          }

          snapshot.forEach((docSnap) => {
              let data = docSnap.data();
              let id = docSnap.id;
              let reelDiv = document.createElement("div");
              reelDiv.className = "reel";
              reelDiv.innerHTML = `
                  <div class="video-wrapper">
                      <div class="creator-details">
                          <div class="creator-user">
                              <img class="creator-img" src="${data.creatorPic || 'https://via.placeholder.com/150'}">
                              <span>@${data.creatorName || 'creator'}</span>
                          </div>
                          <span class="subtitle-text">${data.subtitle || ''}</span>
                      </div>
                      <div class="social-engagement">
                          <div class="engage-item" onclick="window.likeVideo('${id}', ${data.likes || 0})">
                              <div class="engage-icon">❤️</div>
                              <span>${data.likes || 0}</span>
                          </div>
                      </div>
                      <video loop muted autoplay playsinline src="${data.url}" onclick="if(this.paused) this.play(); else this.pause();"></video>
                  </div>
              `;
              container.appendChild(reelDiv);
          });
      });
  }

  // Upload Video Logic
  window.uploadFileToFirebase = async (file) => {
      if(!file || !currentUser) return;
      if (file.size > 30 * 1024 * 1024) {
          alert("ವಿಡಿಯೋ ತುಂಬಾ ದೊಡ್ಡದಾಗಿದೆ! 30MB ಗಿಂತ ಕಡಿಮೆ ಇರೋ ವಿಡಿಯೋ ಹಾಕಿ.");
          return;
      }

      let btn = document.getElementById("addBtn");
      btn.innerText = "⚡ Uploading To Server...";
      btn.disabled = true;

      try {
          let storageRef = ref(storage, 'reels/' + Date.now() + '_' + file.name);
          let uploadSnap = await uploadBytes(storageRef, file);
          let downloadUrl = await getDownloadURL(uploadSnap.ref);
          let subText = document.getElementById("caption-box").value || "Hudko Reels 📲🔥";

          await addDoc(collection(db, "reels"), {
              url: downloadUrl,
              subtitle: subText,
              likes: 0,
              creatorName: currentUser.displayName,
              creatorPic: currentUser.photoURL,
              creatorUid: currentUser.uid,
              timestamp: Date.now()
          });

          alert("🔥 ಯೆಸ್! ನಿಮ್ಮ ವಿಡಿಯೋ ಯಶಸ್ವಿಯಾಗಿ ಲೈವ್ ಆಗಿದೆ!");
          document.getElementById("caption-box").value = "";
      } catch (err) {
          console.error(err);
          alert("ಅಪ್‌ಲೋಡ್ ಫೇಲ್ ಆಗಿದೆ. ದಯವಿಟ್ಟು Storage Rules ಪರಿಶೀಲಿಸಿ!");
      } finally {
          btn.innerText = "+ SELECT VIDEO & UPLOAD";
          btn.disabled = false;
      }
  };

  // Like System
  window.likeVideo = async (id, currentLikes) => {
      try {
          const docRef = doc(db, "reels", id);
          await updateDoc(docRef, { likes: currentLikes + 1 });
      } catch (err) {
          console.error(err);
      }
  };
</script>
</head>
<body>

<div id="authScreen">
    <div class="auth-box">
        <div class="auth-logo">HUDKO REELS</div>
        <div class="auth-desc">ಕ್ರಿಯೇಟರ್ಸ್ ಲೋಕಕ್ಕೆ ಸುಸ್ವಾಗತ. ಮುಂದುವರೆಯಲು ಗೂಗಲ್ ಖಾತೆಯಿಂದ ಲಾಗಿನ್ ಮಾಡಿ.</div>
        <button class="google-btn" onclick="loginWithGoogle()">
            <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_color_24dp.png" width="20">
            Sign in with Google
        </button>
    </div>
</div>

<div id="appContent">
    <div id="top">
      <h2 class="brand">🎬 HUDKO REELS</h2>
      <div class="btn-group">
          <div class="user-profile">
              <img class="profile-pic" id="navUserPic" src="">
              <span id="navUserName" style="font-size: 13px; font-weight: bold; color: #eee;"></span>
          </div>
          <button class="logout-btn" onclick="logoutApp()">Logout</button>
      </div>
    </div>

    <input type="file" id="fileInput" accept="video/*" hidden onchange="uploadFileToFirebase(this.files[0])">
    <div id="reelsContainer"></div>

    <div id="panel">
        <h3 style="margin: 0 0 5px 0; font-size: 16px; color: #ffaa00; font-weight: 800;">🚀 Upload Dashboard</h3>
        <label style="font-size: 12px; color: #aaa;">ವಿಡಿಯೋ ಕ್ಯಾಪ್ಷನ್ ಅಥವಾ ಹ್ಯಾಶ್‌ಟ್ಯಾಗ್ ಇಲ್ಲಿ ಬರೆಯಿರಿ:</label>
        <input type="text" id="caption-box" class="caption-input" placeholder="ಕ್ಯಾಪ್ಷನ್ ಬರೆಯಿರಿ... ✍️">
        <button class="upload-btn" id="addBtn" onclick="document.getElementById('fileInput').click()">+ SELECT VIDEO & UPLOAD</button>
    </div>
</div>

</body>
</html>
